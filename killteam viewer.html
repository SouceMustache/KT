<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kill Team">
<meta name="theme-color" content="#0b0e15">
<title>Kill Team · Viewer</title>
<style>
:root {
  --bg:#0b0e15; --surf:#131720; --card:#181e2c; --border:#252d40;
  --accent:#e03030; --accent2:#ff6b35; --teal:#3ab8a0; --teal2:#5dd4be;
  --text:#e8eaf0; --muted:#7a8199; --gold:#d4a843; --blue:#6ab0ff; --orange:#ffb07a;
  --overlay:rgba(6,8,14,0.97); --tab-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:80px}
header{background:linear-gradient(180deg,#07090f 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:14px 14px 0;position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-top h1{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex}
.tab{flex:1;height:var(--tab-h);display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;-webkit-user-select:none}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .15s}
.tab.active-mine{color:var(--accent);border-color:var(--accent)}
.tab.active-mine .dot{background:var(--accent)}
.tab.active-enemy{color:var(--teal);border-color:var(--teal)}
.tab.active-enemy .dot{background:var(--teal)}
.panel{display:none}.panel.active{display:block}
.panel-toolbar{display:flex;align-items:center;gap:7px;padding:10px 10px 6px}
.dropdown-wrap{position:relative;flex:1;min-width:0}
.faction-select{width:100%;background:var(--surf);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:8px 28px 8px 10px;border-radius:9px;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none}
.dropdown-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none}
.toolbar-btn{background:var(--surf);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 10px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap;-webkit-user-select:none;display:flex;align-items:center;gap:4px;flex-shrink:0}
.toolbar-btn:active{border-color:var(--teal);color:var(--teal)}
.toolbar-btn.mine:active{border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:6px 10px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 12px 10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,transform .1s;-webkit-user-select:none}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .15s}
.card.mine::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.card.enemy::before{background:linear-gradient(90deg,var(--teal),var(--teal2))}
.card:active{transform:scale(0.97)}
.card.mine.selected{border-color:var(--accent);background:rgba(224,48,48,.08)}
.card.mine.selected::before{opacity:1}
.card.enemy.selected{border-color:var(--teal);background:rgba(58,184,160,.08)}
.card.enemy.selected::before{opacity:1}
.card-num{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent;transition:all .15s;z-index:2;cursor:pointer}
.card.mine.selected .card-num{background:var(--accent);border-color:var(--accent);color:#fff}
.card.enemy.selected .card-num{background:var(--teal);border-color:var(--teal);color:#fff}
.card-role{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.card-name{font-size:15px;font-weight:800;line-height:1.15;letter-spacing:-.01em;color:var(--text);padding-right:34px}
.card-name.long{font-size:12px}
.stat-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.sm{font-size:10px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:22px}
.sm span:first-child{font-size:8px;font-weight:700;letter-spacing:.05em;color:var(--accent)}
.card.enemy .sm span:first-child{color:var(--teal)}
.sm span:last-child{font-size:13px;font-weight:800;color:var(--text)}
.card-pills{display:flex;gap:6px;margin-top:8px}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--surf);color:var(--muted)}
.pill.w{color:#e07070}.pill.sv{color:var(--gold)}
.overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.ov-inner{padding:0 0 48px;min-height:100%}
.ov-header{padding:18px 14px 16px;background:linear-gradient(180deg,#060810 0%,rgba(6,8,16,0) 100%);position:sticky;top:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ov-role{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:3px}
.ov-name{font-size:22px;font-weight:900;letter-spacing:-.02em;line-height:1.1}
.ov-badges{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.badge-apl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(224,48,48,.18);color:#f09090;border:1px solid rgba(224,48,48,.3)}
.badge-apl.enemy{background:rgba(58,184,160,.15);color:var(--teal2);border-color:rgba(58,184,160,.3)}
.badge-w{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.badge-sv{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.close-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:50%;width:36px;height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;-webkit-user-select:none}
.ov-body{padding:0 14px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-label.enemy{color:var(--teal)}.sec-label.neutral{color:var(--muted)}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.wpn-table{width:100%;border-collapse:collapse}
.wpn-table th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.wpn-table td{font-size:12px;padding:6px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;color:var(--text)}
.wpn-table td:first-child{font-weight:700}
.wpn-table td.num{text-align:center;font-weight:700}
.wpn-wr{font-size:10px;color:var(--muted)}
.wpn-table tr:last-child td{border-bottom:none}
.abilities{display:flex;flex-direction:column;gap:7px}
.ability{background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:8px 10px}
.ability-name{font-size:11px;font-weight:800;color:var(--text);margin-bottom:3px}
.ability-desc{font-size:11px;line-height:1.5;color:var(--muted)}
.ability.unique{border-color:#2a3a22}.ability.unique .ability-name{color:#8fcf70}
.rules-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.rules-item-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;-webkit-user-select:none;gap:8px}
.rules-item-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.rules-item-name.strat{color:var(--blue)}.rules-item-name.fight{color:var(--orange)}
.rules-item-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.rules-item.open .rules-item-chevron{transform:rotate(90deg)}
.rules-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.rules-item.open .rules-item-body{display:block}
.tp-dots{display:flex;gap:4px;flex-shrink:0}
.tp-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-user-select:none}
.tp-dot.used-strat{background:var(--blue);border-color:var(--blue);color:#fff}
.tp-dot.used-fight{background:var(--orange);border-color:var(--orange);color:#0b0e15}
.eq-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.eq-item-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;-webkit-user-select:none}
.eq-check{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .15s;flex-shrink:0}
.eq-item.taken .eq-check{background:var(--teal);border-color:var(--teal);color:#fff}
.eq-item.taken.mine-eq .eq-check{background:var(--accent);border-color:var(--accent);color:#fff}
.eq-item-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.eq-item-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.eq-item.open .eq-item-chevron{transform:rotate(90deg)}
.eq-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.eq-item.open .eq-item-body{display:block}
</style>
</head>
<body>

<header>
  <div class="header-top"><h1>Kill Team · Field Viewer</h1></div>
  <div class="tabs">
    <div class="tab active-mine" id="tab-mine" onclick="switchTab('mine')"><div class="dot"></div> Mój Team</div>
    <div class="tab" id="tab-enemy" onclick="switchTab('enemy')"><div class="dot"></div> Przeciwnik</div>
  </div>
</header>

<div class="panel active" id="panel-mine">
  <div class="panel-toolbar">
    <div class="dropdown-wrap">
      <select class="faction-select" id="mine-select" onchange="switchMineFaction(this.value)">
        <option value="murderwing">Murderwing</option>
        <option value="raveners">Raveners</option>
        <option value="xv26">XV26 Stealth Battlesuits</option>
        <option value="hearthkyn">Hearthkyn Salvager</option>
        <option value="goremonger">Goremonger</option>
      </select>
      <span class="dropdown-arrow">&#9660;</span>
    </div>
    <div class="toolbar-btn mine" onclick="openRules('mine')">&#9876; Zasady</div>
    <div class="toolbar-btn mine" onclick="openEq('mine')">&#127920; EQ</div>
  </div>
  <div id="mine-grids"></div>
</div>

<div class="panel" id="panel-enemy">
  <div class="panel-toolbar">
    <div class="dropdown-wrap">
      <select class="faction-select" id="enemy-select" onchange="switchEnemyFaction(this.value)">
        <option value="murderwing">Murderwing</option>
        <option value="raveners" selected>Raveners</option>
        <option value="xv26">XV26 Stealth Battlesuits</option>
        <option value="hearthkyn">Hearthkyn Salvager</option>
        <option value="goremonger">Goremonger</option>
      </select>
      <span class="dropdown-arrow">&#9660;</span>
    </div>
    <div class="toolbar-btn" onclick="openRules('enemy')">&#9876; Zasady</div>
    <div class="toolbar-btn" onclick="openEq('enemy')">&#127920; EQ</div>
  </div>
  <div id="enemy-grids"></div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="ov-role"></div><div class="ov-name" id="ov-name"></div><div class="ov-badges" id="ov-badges"></div></div>
      <div class="close-btn" onclick="closeOverlay()">&#x2715;</div>
    </div>
    <div class="ov-body" id="ov-body"></div>
  </div>
</div>

<div class="overlay" id="rules-overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="ro-sub"></div><div class="ov-name" id="ro-name"></div></div>
      <div class="close-btn" onclick="closeRules()">&#x2715;</div>
    </div>
    <div class="ov-body" id="ro-body"></div>
  </div>
</div>

<div class="overlay" id="eq-overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="eq-sub"></div><div class="ov-name" id="eq-name"></div></div>
      <div class="close-btn" onclick="closeEq()">&#x2715;</div>
    </div>
    <div class="ov-body" id="eq-body"></div>
  </div>
</div>

<script>
const MINE = [
  {

  {

      {name:'Bolt pistol',       atk:4,hit:'3+',dmg:'3/4', wr:'Range 8"'},

FACTION_RULES.murderwing = FACTION_RULES.mine;
FACTION_EQ.murderwing    = FACTION_EQ.mine;

/* STATE */
var activeTab      = 'mine';
var mineFaction    = 'murderwing';
var enemyFaction   = 'raveners';
var selected       = {};
var selectCounter  = 0;
var eqTaken        = {};
var ployTP         = {};

/* BUILD GRID */
function buildGrid(faction, side) {
  var units = ALL_FACTION_UNITS[faction] || [];
  var grid  = document.createElement('div');
  grid.className = 'grid';
  grid.id = 'grid-' + side + '-' + faction;
  units.forEach(function(u) {
    var u2 = Object.assign({}, u, {side: side});
    grid.appendChild(buildCard(u2));
  });
  return grid;
}

function showGrid(side, faction) {
  var container = document.getElementById(side === 'mine' ? 'mine-grids' : 'enemy-grids');
  Array.from(container.children).forEach(function(c){ c.style.display = 'none'; });
  var existing = document.getElementById('grid-' + side + '-' + faction);
  if (existing) {
    existing.style.display = '';
  } else {
    container.appendChild(buildGrid(faction, side));
  }
}

/* BUILD CARD */
function buildCard(unit) {
  var card   = document.createElement('div');
  var uid    = unit.side + '-' + unit.id;
  card.className = 'card ' + unit.side;
  card.id        = 'card-' + uid;

  var statKeys = ['APL','MOV','SV','W'];
  var statVals = [unit.apl, unit.move, unit.save, unit.wounds];
  var statRow  = statKeys.map(function(k,i){
    return '<div class="sm"><span>'+k+'</span><span>'+statVals[i]+'</span></div>';
  }).join('');

  var long = unit.name.length > 15;
  card.innerHTML =
    '<div class="card-num" id="num-'+uid+'"></div>' +
    '<div class="card-role">'+unit.role+'</div>' +
    '<div class="card-name'+(long?' long':'')+'">'+unit.name+'</div>' +
    '<div class="stat-row">'+statRow+'</div>' +
    '<div class="card-pills"><span class="pill w">W '+unit.wounds+'</span><span class="pill sv">Sv '+unit.save+'</span></div>';

  card.querySelector('.card-num').addEventListener('click', function(e){
    e.stopPropagation();
    toggleSelect(unit, uid);
  });
  card.addEventListener('click', function(){ openOverlay(unit); });
  return card;
}

function toggleSelect(unit, uid) {
  var card = document.getElementById('card-' + uid);
  if (selected[uid] !== undefined) {
    var removedNum = selected[uid];
    delete selected[uid];
    selectCounter--;
    Object.keys(selected).forEach(function(id){
      if (selected[id] > removedNum) { selected[id]--; updateNum(id); }
    });
    if (card) card.classList.remove('selected');
    updateNum(uid);
  } else {
    selectCounter++;
    selected[uid] = selectCounter;
    if (card) card.classList.add('selected');
    updateNum(uid);
  }
  reorderGrid(unit.side);
}

function updateNum(uid) {
  var el = document.getElementById('num-' + uid);
  if (!el) return;
  el.textContent = selected[uid] !== undefined ? selected[uid] : '';
}

function reorderGrid(side) {
  var faction = side === 'mine' ? mineFaction : enemyFaction;
  var grid    = document.getElementById('grid-' + side + '-' + faction);
  if (!grid) return;
  var cards   = Array.from(grid.children);
  var sel     = cards.filter(function(c){ return c.classList.contains('selected'); })
                     .sort(function(a,b){
                       var na = selected[a.id.replace('card-','')] || 999;
                       var nb = selected[b.id.replace('card-','')] || 999;
                       return na - nb;
                     });
  var unsel   = cards.filter(function(c){ return !c.classList.contains('selected'); });
  sel.concat(unsel).forEach(function(c){ grid.appendChild(c); });
}

/* UNIT OVERLAY */
function openOverlay(unit) {
  var isEnemy = unit.side === 'enemy';
  var ac = isEnemy ? 'enemy' : '';
  document.getElementById('ov-role').textContent  = unit.role;
  document.getElementById('ov-role').style.color  = isEnemy ? 'var(--teal)' : 'var(--accent)';
  document.getElementById('ov-name').textContent  = unit.name;
  document.getElementById('ov-badges').innerHTML  =
    '<span class="badge-apl '+ac+'">APL '+unit.apl+'</span>' +
    '<span class="badge-w">W '+unit.wounds+'</span>' +
    '<span class="badge-sv">Sv '+unit.save+' · Move '+unit.move+'</span>';

  var html = '<div class="sec-label '+ac+'">Broń</div>' +
    '<table class="wpn-table"><tr><th>Nazwa</th><th style="text-align:center">ATK</th><th style="text-align:center">HIT</th><th style="text-align:center">DMG</th><th>Zasady</th></tr>';
  unit.weapons.forEach(function(w){
    html += '<tr><td>'+w.name+'</td><td class="num">'+w.atk+'</td><td class="num">'+w.hit+'</td><td class="num">'+w.dmg+'</td><td class="wpn-wr">'+w.wr+'</td></tr>';
  });
  html += '</table>';

  if (unit.abilities && unit.abilities.length) {
    html += '<div class="sec-label '+ac+'">Zdolności</div><div class="abilities">';
    unit.abilities.forEach(function(a){
      html += '<div class="ability'+(a.unique?' unique':'')+'"><div class="ability-name">'+a.name+'</div><div class="ability-desc">'+a.desc+'</div></div>';
    });
    html += '</div>';
  }
  document.getElementById('ov-body').innerHTML = html;
  var ov = document.getElementById('overlay');
  ov.classList.add('open'); ov.scrollTop = 0;
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); }

/* RULES OVERLAY */
function openRules(side) {
  var fkey = side === 'mine' ? mineFaction : enemyFaction;
  var data = FACTION_RULES[fkey];
  if (!data) return;
  document.getElementById('ro-sub').textContent = data.subtitle || '';
  document.getElementById('ro-sub').style.color = data.color || 'var(--muted)';
  document.getElementById('ro-name').textContent = data.name;
  var isEnemy = side === 'enemy';
  var html = '';

  if (data.rules && data.rules.length) {
    html += '<div class="sec-label neutral">Zasady Frakcji</div>';
    data.rules.forEach(function(r,i){ html += makeRuleItem('rr-'+i, r.name, '', r.desc, '', false); });
  }
  if (data.strat && data.strat.length) {
    html += '<div class="sec-label neutral">Strategy Ploys</div>';
    data.strat.forEach(function(r,i){
      var uid = 'strat-'+fkey+'-'+i;
      html += makeRuleItem('rs-'+i, r.name, 'strat', r.desc, uid, isEnemy, 'strat');
    });
  }
  if (data.fight && data.fight.length) {
    html += '<div class="sec-label neutral">Firefight Ploys</div>';
    data.fight.forEach(function(r,i){
      var uid = 'fight-'+fkey+'-'+i;
      html += makeRuleItem('rf-'+i, r.name, 'fight', r.desc, uid, isEnemy, 'fight');
    });
  }
  document.getElementById('ro-body').innerHTML = html;
  var ov = document.getElementById('rules-overlay');
  ov.classList.add('open'); ov.scrollTop = 0;
}

function makeRuleItem(id, name, nameClass, desc, uid, showDots, dotType) {
  var dots = '';
  if (showDots && uid) {
    var used = ployTP[uid] || {};
    dots = '<div class="tp-dots">' +
      [1,2,3,4].map(function(tp){
        var cls = used[tp] ? ('tp-dot used-' + dotType) : 'tp-dot';
        return '<div class="'+cls+'" data-uid="'+uid+'" data-tp="'+tp+'" data-type="'+dotType+'" onclick="toggleTP(event)">'+tp+'</div>';
      }).join('') + '</div>';
  }
  return '<div class="rules-item" id="'+id+'">' +
    '<div class="rules-item-header" onclick="toggleRuleItem(&quot;'+id+'&quot;)"><span class="rules-item-name '+nameClass+'">'+name+'</span>'+dots+'<span class="rules-item-chevron">&#9658;</span></div>' +
    '<div class="rules-item-body">'+desc+'</div></div>';
}

function toggleTP(e) {
  e.stopPropagation();
  var el   = e.currentTarget;
  var uid  = el.dataset.uid;
  var tp   = parseInt(el.dataset.tp);
  var type = el.dataset.type;
  if (!ployTP[uid]) ployTP[uid] = {};
  if (ployTP[uid][tp]) {
    delete ployTP[uid][tp];
    el.className = 'tp-dot';
  } else {
    ployTP[uid][tp] = true;
    el.className = 'tp-dot used-' + type;
  }
}

function toggleRuleItem(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}
function closeRules(){ document.getElementById('rules-overlay').classList.remove('open'); }

/* EQ OVERLAY */
function openEq(side) {
  var fkey  = side === 'mine' ? mineFaction : enemyFaction;
  var data  = FACTION_EQ[fkey];
  var rules = FACTION_RULES[fkey];
  if (!data) return;
  document.getElementById('eq-sub').textContent  = rules ? rules.subtitle : '';
  document.getElementById('eq-sub').style.color  = rules ? rules.color : 'var(--muted)';
  document.getElementById('eq-name').textContent = (rules ? rules.name : fkey) + ' · Ekwipunek';

  var isMine = side === 'mine';
  var html = '';
  data.forEach(function(eq, i){
    var uid     = 'eq-' + fkey + '-' + i;
    var taken   = !!eqTaken[uid];
    var mClass  = isMine ? ' mine-eq' : '';
    html += '<div class="eq-item'+(taken?' taken':'')+mClass+'" id="'+uid+'">' +
      '<div class="eq-item-header" data-uid="'+uid+'" onclick="toggleEqItem(this.dataset.uid)">' +
        '<div class="eq-check" data-uid="'+uid+'" onclick="toggleEqTaken(event,this.dataset.uid)">&#x2713;</div>' +
        '<span class="eq-item-name">'+eq.name+'</span>' +
        '<span class="eq-item-chevron">&#9658;</span>' +
      '</div>' +
      '<div class="eq-item-body">'+eq.desc+'</div>' +
    '</div>';
  });
  document.getElementById('eq-body').innerHTML = html;
  var ov = document.getElementById('eq-overlay');
  ov.classList.add('open'); ov.scrollTop = 0;
}

function toggleEqTaken(e, uid) {
  e.stopPropagation();
  var el = document.getElementById(uid);
  if (!el) return;
  if (eqTaken[uid]) { delete eqTaken[uid]; el.classList.remove('taken'); }
  else              { eqTaken[uid] = true;  el.classList.add('taken'); }
}

function toggleEqItem(uid) {
  var el = document.getElementById(uid);
  if (el) el.classList.toggle('open');
}

function closeEq(){ document.getElementById('eq-overlay').classList.remove('open'); }

/* TABS & FACTION SWITCH */
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('panel-mine').classList.toggle('active',  tab === 'mine');
  document.getElementById('panel-enemy').classList.toggle('active', tab === 'enemy');
  document.getElementById('tab-mine').className  = 'tab' + (tab === 'mine'  ? ' active-mine'  : '');
  document.getElementById('tab-enemy').className = 'tab' + (tab === 'enemy' ? ' active-enemy' : '');
}

function switchMineFaction(faction) {
  mineFaction = faction;
  showGrid('mine', faction);
}

function switchEnemyFaction(faction) {
  enemyFaction = faction;
  showGrid('enemy', faction);
}

/* INIT */
showGrid('mine',  'murderwing');
showGrid('enemy', 'raveners');

['overlay','rules-overlay','eq-overlay'].forEach(function(id){
  document.getElementById(id).addEventListener('click', function(e){
    if (e.target === this) this.classList.remove('open');
  });
});
</script>
