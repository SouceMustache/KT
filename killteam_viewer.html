    {id:"xv-jammers", name:"Counter-Network Jammers", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT. Select one objective marker or mission marker. Until the end of the turning point, whenever determining control of that marker, treat the total APL stat of enemy operatives that contest it as 1 lower if at least one contesting enemy operative is within 3\" of a friendly XV26 STEALTH BATTLESUIT operative.</li><li class=\"desc-red\">Not a change to APL stat, so cumulative with other changes.</li></ul>"},
    {id:"xv-targetlocks", name:"Hardwired Target Locks", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever you would counteract, you can do so with one friendly XV26 STEALTH BATTLESUIT operative that has a Conceal order and is more than 3\" from enemy operatives.</li><li class=\"desc-red\">Before it counteracts, you must change its order to Engage and it cannot perform any actions other than Shoot during that counteraction.</li></ul>"}
  ],
  "hearthkyn": [
    {id:"hk-plasmaknives", name:"Plasma Knives", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly HEARTHKYN SALVAGER operatives gain the following melee weapon:</li></ul><div class=\"inline-wpn\"><span class=\"inline-wpn-name\">Plasma Knives</span><div class=\"inline-wpn-stats\"><div class=\"inline-wpn-stat\"><span>ATK</span><span>3</span></div><div class=\"inline-wpn-stat\"><span>HIT</span><span>4+</span></div><div class=\"inline-wpn-stat\"><span>DMG</span><span>3/5</span></div></div><span class=\"inline-wpn-wr\">Lethal 5+</span></div><ul class=\"desc-list\"><li class=\"desc-red\">The FIELD MEDIC already has this weapon with better stats — use the better version in that case.</li></ul>"},
    {id:"hk-excavation", name:"Excavation Tools", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly HEARTHKYN SALVAGER operatives can perform the Pick Up Marker action for 1 less AP.</li><li class=\"desc-green\">They do not have to control the marker to pick it up \u2014 they only need to contest it.</li></ul>"},
    {id:"hk-climbing", name:"Climbing Rigs", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">During each friendly HEARTHKYN SALVAGER operative's activation, you can do one of the following:</li><li class=\"desc-green\">When climbing up, treat the vertical distance as 2\" regardless of actual distance.</li><li class=\"desc-green\">When dropping, ignore the vertical distance.</li></ul>"},
    {id:"hk-writ", name:"Writ of Claim", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle, if friendly HEARTHKYN SALVAGER operatives contest two or more objective markers, after rolling off to decide initiative, you can re-roll your dice.</li></ul>"}
  ],
  "goremonger": [
    {id:"gm-gorytotem", name:"Gory Totem", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Before the battle, set up one Gory Totem marker wholly within your territory and more than 2\" from other markers (excluding your Bloody Cadaver marker).</li><li class=\"desc-green\">Whenever an enemy operative within 3\" of your Gory Totem marker is shooting, fighting or retaliating, your opponent cannot re-roll their attack dice.</li></ul>"},
    {id:"gm-cadaver", name:"Bloody Cadaver", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Before the battle, set up one Bloody Cadaver marker wholly within your territory and more than 2\" from other markers (excluding your Gory Totem marker).</li><li class=\"desc-green\">Friendly GOREMONGER operatives can perform the Pick Up Marker action on it.</li><li class=\"desc-green\">In the Ready step of each Strategy phase, you can increase the GORE TANK of one friendly GOREMONGER operative that controls that marker.</li><li class=\"desc-red\">Cannot increase GORE TANK if that operative is within control range of an enemy operative.</li></ul>"},
    {id:"gm-chaossigil", name:"Chaos Sigil", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when an operative is shooting a friendly GOREMONGER operative, at the start of the Roll Defence Dice step you can use this rule. Worsen the Piercing weapon rule by 1 (if any) until the end of that sequence.</li><li class=\"desc-red\">Note: Piercing 1 would therefore be ignored.</li></ul>"},
    {id:"gm-wristchains", name:"Wrist Chains", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly GOREMONGER operative performs the Shoot action, until the end of that action the following melee weapons are treated as ranged weapons with Range 2\": chainblade, chainglaive, great chainaxe (ignore Brutal), pickrippers.</li></ul>"}
  ],
  "deathwatch": [{id:"dw-digital",name:"Digital Weapons",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly DEATHWATCH operative performs the Fight action, at the start of the Roll Attack Dice step, you can use this rule. If you do, inflict 1 damage on the enemy operative in that sequence.</li></ul>"},{id:"dw-bioscryer",name:"Sanctus-V Bioscryer Cuffs",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once during each friendly DEATHWATCH operative's activation, before or after it performs an action, if it is not within control range of enemy operatives, select one: that operative regains up to D3 lost wounds; remove any changes to its APL stat; remove one of the following tokens it has: Neutron Fragment, Poison, Terrorchem.</li></ul>"},{id:"dw-scrutavore",name:"Scrutavore Servo-Thrall",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, during a friendly DEATHWATCH operative's activation, that operative can perform a mission action for 1 less AP. Having an enemy operative within control range does not prevent the mission action.</li><li class=\"desc-red\">However, after doing so in this situation, you and your opponent roll-off. If your opponent wins, you cannot use this equipment for the rest of the battle.</li></ul>"},{id:"dw-ammo",name:"Ammunition Reserve",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle, you can use the Special Issue Ammunition faction rule for up to two Shoot actions during one turning point.</li><li class=\"desc-red\">You must select different weapon rules for both uses. This takes precedence over the normal Special Issue Ammunition rules.</li></ul>"}],
  "wolf-scouts": [{id:"ws-frost",name:"Frost Weapons",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly WOLF SCOUT operative is wholly within your STORM, its combat blade (if any) has the Lethal 5+ weapon rule.</li></ul>"},{id:"ws-wolfteeth",name:"Wolfteeth Necklaces",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly WOLF SCOUT operative (excluding FENRISIAN WOLF) is shooting, fighting or retaliating, if you roll two or more fails, you can discard one of them to retain another as a normal success instead.</li></ul>"},{id:"ws-runic",name:"Runic Charms",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when an operative is shooting a friendly WOLF SCOUT operative (excluding FENRISIAN WOLF) that's wholly within your STORM, at the start of the Roll Defence Dice step, you can use this rule. Worsen the Piercing weapon rule by 1 (if any) until the end of that sequence.</li><li class=\"desc-red\">Note: Piercing 1 would therefore be ignored.</li></ul>"},{id:"ws-trophies",name:"Talismanic Trophies",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly WOLF SCOUT operative (excluding FENRISIAN WOLF) that's wholly within your STORM is fighting or retaliating, in the Resolve Attack Dice step, you can subtract 1 from the damage inflicted on it from one success.</li></ul>"}],
  "canoptek": [{id:"cc-manipulator",name:"Matrix Manipulator",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle, during a friendly CANOPTEK CIRCLE operative's activation or counteraction, until the end of that activation/counteraction, a friendly CANOPTEK CIRCLE GEOMANCER operative is treated as your fourth OBELISK NODE marker.</li></ul>"},{id:"cc-nanoscarab",name:"Nanoscarab Caskets",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly CANOPTEK CIRCLE operative is activated, it regains up to D3 lost wounds.</li></ul>"},{id:"cc-awakened",name:"Awakened Obelisk Nodes",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">After revealing this equipment option, roll one D3. You can use the Animate Obelisk Nodes firefight ploy for 0CP a number of times during the battle equal to the result.</li></ul>"},{id:"cc-phase",name:"Phase Shifter",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when an operative is shooting a friendly CANOPTEK CIRCLE GEOMANCER operative, at the start of the Roll Defence Dice step, worsen the Piercing weapon rule by 1 (if any) until the end of that sequence.</li><li class=\"desc-red\">Note: Piercing 1 would therefore be ignored.</li></ul>"}],
  "hernkyn": [{id:"hy-plasmakn",name:"Plasma Knives",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly HERNKYN YAEGIR operatives gain the following melee weapon:</li></ul><div class=\"inline-wpn\"><span class=\"inline-wpn-name\">Plasma Knife</span><div class=\"inline-wpn-stats\"><div class=\"inline-wpn-stat\"><span>ATK</span><span>3</span></div><div class=\"inline-wpn-stat\"><span>HIT</span><span>4+</span></div><div class=\"inline-wpn-stat\"><span>DMG</span><span>3/5</span></div></div><span class=\"inline-wpn-wr\">Lethal 5+</span></div><ul class=\"desc-list\"><li class=\"desc-red\">Some operatives already have this weapon with better stats \u2014 use the better version, and that weapon has the Balanced weapon rule for the battle.</li></ul>"},{id:"hy-stabolt",name:"Stabilised Bolt Shells",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Up to twice per turning point, whenever a friendly HERNKYN YAEGIR operative is performing the Shoot action and you select a bolt shotgun (long range), until the end of that action, improve the Hit stat of that weapon by 1 and add 1 to both of its Dmg stats.</li></ul>"},{id:"hy-firestorm",name:"Firestorm Bolt Shells",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly HERNKYN YAEGIR operative is performing the Shoot action and you select a bolt shotgun (short range), until the end of that action, that weapon has the Blast 1\" weapon rule.</li></ul>"},{id:"hy-ceramide",name:"KV-Ceramide Undersuit",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly HERNKYN YAEGIR operative, if the ranged weapon has the Blast or Torrent weapon rule, you can re-roll one of your defence dice.</li><li class=\"desc-green\">Friendly HERNKYN YAEGIR operatives are not affected by the Devastating with a distance weapon rule unless they are the target during that sequence.</li></ul>"}],
  "vespid": [{id:"vs-neuro",name:"Neurostimulant",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">In the Ready step of each Strategy phase, when determining how many Communion points to gain, you can roll two D3 and select one D3 to use.</li></ul>"},{id:"vs-conv",name:"Convergence Stimulant",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, a friendly VESPID STINGWING operative can perform the Pick Up Marker or a mission action without you spending a Communion point.</li></ul>"},{id:"vs-accel",name:"Accelerant Stimulant",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly VESPID STINGWING operative (excluding OVERSIGHT DRONE) performs the Charge or Dash action, it can move an additional 1\". If it uses FLY for this action, you can set it back up 1\" further away.</li></ul>"},{id:"vs-aggro",name:"Aggression Stimulant",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly VESPID STINGWING operative (excluding OVERSIGHT DRONE) is fighting, its melee weapons have the Ceaseless weapon rule.</li></ul>"}]
};
var UNIVERSAL_EQ = [{"id": "ue-ammo", "name": "1x Ammo Cache", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Before the battle, set up one Ammo Cache marker in your territory.</li></ul><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">AMMO RESUPPLY</span><span class=\"inline-action-ap\">0AP</span></div><p class=\"inline-action-desc\">one Ammo Cache marker you control is used this turning point \u2014 until the start of the next turning point, when shooting with a weapon from this operative's datacard, you can re-roll one attack dice.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">Cannot use while within control range of an enemy operative or if the marker has been used this turning point or isn't yours.</li></ul>"}, {"id": "ue-razor", "name": "1x Razor Wire", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Exposed and Obstructing terrain.</li><li class=\"desc-green\">Set up wholly within your territory before the battle, on the killzone floor and more than 2\" from other equipment terrain features, access points and Accessible terrain.</li><li class=\"desc-green\">Obstructing: whenever an operative would cross over this terrain feature within 1\" of it, treat the distance as an additional 1\".</li></ul>"}, {"id": "ue-comms", "name": "1x Comms Device", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Before the battle, set up one Comms Device marker in your territory. While a friendly operative controls this marker, add 3\" to the distance requirements of its SUPPORT rules that refer to friendly operatives.</li><li class=\"desc-green\">Note that you cannot benefit from your opponent's Comms Device markers.</li></ul>"}, {"id": "ue-mines", "name": "1x Mines", "desc": "Before the battle, set up one Mines marker in your territory, more than 2\" from other markers, access points and Accessible terrain. The first time that marker is within an operative's control range, remove it and inflict D3+3 damage on that operative."}, {"id": "ue-lbarricade", "name": "2x Light Barricades", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Light terrain (feet are Insignificant and Exposed).</li><li class=\"desc-green\">Before the battle, you can set up any of them wholly within your territory, on the killzone floor and more than 2\" from other equipment terrain features, access points and Accessible terrain.</li></ul>"}, {"id": "ue-hbarricade", "name": "1x Heavy Barricade", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Heavy terrain.</li><li class=\"desc-green\">Set up wholly within 4\" of your drop zone before the battle, on the killzone floor and more than 2\" from other equipment terrain features, access points and Accessible terrain.</li></ul>"}, {"id": "ue-ladders", "name": "2x Ladders", "desc": "Insignificant and Exposed terrain. Set up within your territory, upright against terrain at least 2\" tall, more than 2\" from other equipment terrain features and more than 1\" from doors and access points. Once per action, when an operative is climbing the terrain a ladder is placed against, treat the vertical distance as 1\" if the ladder is within control range during the entire climb."}, {"id": "ue-portable", "name": "1x Portable Barricade", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Light, Protective and Portable terrain (feet Insignificant/Exposed).</li><li class=\"desc-green\">Protective: while in cover from this feature, improve Save stat by 1 (max 2+).</li><li class=\"desc-green\">Portable: only provides cover while an operative is connected and the shield is intervening.</li></ul><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">MOVE WITH BARRICADE</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">The same as the Reposition action, except the active operative can move no more than its Move stat minus 2\" and cannot climb, drop, jump or use any kill team's rules that remove it and set it back up again.</p><p class=\"inline-action-desc\" style=\"margin-top:6px\">Before this operative moves, remove the portable barricade it's connected to. After it moves, set up the portable barricade so it's connected again, but the portable barricade cannot be set up within 2\" of other equipment terrain features, access points or Accessible terrain. If this is not possible, the portable barricade is not set up again.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">This action is treated as a Reposition action. An operative cannot perform this action while within control range of an enemy operative, or during the same activation in which it performed the Fall Back or Charge action.</li></ul>"}, {"id": "ue-utility", "name": "Utility Grenades", "desc": "<span class=\"desc-text\">Select two utility grenades (2 smoke, 2 stun, or 1+1). Each effect usable a number of times equal to your selection.</span><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">SMOKE GRENADE</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Place a Smoke Grenade marker within 6\" visible to this operative. Operatives wholly within are Obscured to those more than 2\" away; Piercing 2/Crits 2 becomes Piercing 1/Crits 1 within smoke unless within 2\".</p><p class=\"inline-action-desc\" style=\"margin-top:6px\">In the Ready step of the next Strategy phase, roll one D3. Remove that Smoke Grenade marker after a number of activations equal to that D3 have been completed or at the end of the turning point (whichever comes first).</p></div><ul class=\"desc-list\"><li class=\"desc-red\">An operative cannot perform this action while within control range of an enemy operative, or if you have reached the total number of times your kill team can perform it.</li></ul><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">STUN GRENADE</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Select visible enemy within 6\" \u2014 it and each operative within 1\" take a stun test (D6, on 3+ subtract 1 APL until end of next activation).</p></div><ul class=\"desc-list\"><li class=\"desc-red\">An operative cannot perform this action while within control range of an enemy operative, or if you have reached the total number of times your kill team can perform it.</li></ul>"}, {"id": "ue-explosive", "name": "Explosive Grenades", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Select two explosive grenades (2 frag, 2 krak, or 1+1). Each usable a number of times equal to your selection.</li></ul><div class=\"inline-wpn\"><span class=\"inline-wpn-name\">Frag grenade</span><div class=\"inline-wpn-stats\"><div class=\"inline-wpn-stat\"><span>ATK</span><span>4</span></div><div class=\"inline-wpn-stat\"><span>HIT</span><span>4+</span></div><div class=\"inline-wpn-stat\"><span>DMG</span><span>2/4</span></div></div><span class=\"inline-wpn-wr\">Range 6\", Blast 2\", Saturate</span></div><div class=\"inline-wpn\"><span class=\"inline-wpn-name\">Krak grenade</span><div class=\"inline-wpn-stats\"><div class=\"inline-wpn-stat\"><span>ATK</span><span>4</span></div><div class=\"inline-wpn-stat\"><span>HIT</span><span>4+</span></div><div class=\"inline-wpn-stat\"><span>DMG</span><span>4/5</span></div></div><span class=\"inline-wpn-wr\">Range 6\", Piercing 1, Saturate</span></div>"}, {"id": "ue-breach", "name": "Breaching Charge", "desc": "Once per battle, when a friendly operative performs the Breach action, it can perform it for 1 less AP (minimum 1AP) as though it had the word \"breach marker\" on its datacard."}];

FACTION_RULES['murderwing'] = FACTION_RULES['mine'];
FACTION_EQ['mine'] = FACTION_EQ['murderwing'];


const FACTION_FAQ = {"murderwing": [{"q": "Can I use Wings of Darkness during the activation that a WARP TALON operative is set up from the warp to use more than 4\" of move distance during that activation?", "a": "No."}, {"q": "When using the Long Forgotten Honour firefight ploy, if the free Fall Back action is prevented (e.g. MANDRAKES Chain Snares), is the spent CP refunded?", "a": "No."}], "raveners": [{"q": "Are RAVENER operatives underground considered \"in the killzone\" for the second victory points paragraph of the Implant tac op?", "a": "Yes. Note that other tac ops (e.g. Surveillance) would still require those operatives to be in the killzone."}, {"q": "Can an expended friendly TREMORSCYTHE operative counteract to interrupt an enemy operative's activation with the Subterranean Ambush rule if there are still other ready friendly RAVENER operatives?", "a": "Yes."}, {"q": "When my TREMORSCYTHE operative interrupts my opponent's activation, if the enemy operative is incapacitated (and therefore its activation cannot be continued), who activates next? Equally, if it isn't incapacitated and then continues its activation, who activates next?", "a": "Your opponent in both cases, as the TREMORSCYTHE operative has used your activation."}, {"q": "If a friendly RAVENER TREMORSCYTHE operative attempts to shoot or fight against the specified enemy operative in its Subterranean Ambush rule, but is prevented from doing so by an opponent's rule (e.g. SANCTIFIER CONFESSOR Commanding Declamation, NOVITIATE Blinding Aura) is the activation/counteraction still cancelled?", "a": "No. Continue its activation/counteraction as though the requirements of the Subterranean Ambush rule have been fulfilled."}], "xv26": [{"q": "Do rules which have an effect when an operative \"ends a move\" (e.g. NEMESIS CLAW We Have Come For You) still occur before an operative performs a Fall Back action with the Vectored Retro-Thrusters firefight ploy?", "a": "Yes."}, {"q": "If an operative is on guard, can it perform a point-blank shot before performing a Fall Back action with the Vectored Retro-Thrusters firefight ploy?", "a": "Yes."}, {"q": "If my Homing Beacon marker is being carried by the LODESTAR, does it count as being \"in the killzone\"?", "a": "No."}], "hearthkyn": [{"q": "If a HEARTHKYN SALVAGER DÔZR operative performing its Knux Smash action moves an enemy operative, and during that move a marker that would \"end its action\" is within that enemy operative's control range (e.g. HERNKYN YAEGIR IRONBRAEK Hy-Pex Mines) but not the DÔZR operative's control range, does the Knux Smash action end?", "a": "No."}], "goremonger": [{"q": "If a melee weapon has the Balanced or Relentless weapon rule as a result of the Enhanced Violence strategy ploy, and is then used as a ranged weapon as a result of the Wrist Chains faction equipment, does the new ranged weapon still have the Balanced or Relentless weapon rule?", "a": "No."}, {"q": "When determining whether a friendly operative's GORE TANK is full for the purposes of the Enhanced Violence strategy ploy, do I check before or after decreasing its Gore Tank for any Sanguavitae (e.g. Rage) for that action?", "a": "After."}],
  "deathwatch": [],
  "wolf-scouts": [{"q": "How should movement for the FENRISIAN WOLF (60x35mm base) be measured if that operative rotates during a movement?", "a": "No part of its base can move more than the permitted distance, so if it rotates, include the distance it rotates while measuring. For example, if the operative can move 8\" and the front of its base has done so, but the back of the base has rotated 90° in the process, this will have caused the back of the base to move more than 8\", which is more than the permitted distance."}, {"q": "Can my STORM be measured through Wall Terrain in Close Quarters?", "a": "No."}, {"q": "If the free Fight action from the Counterattack firefight ploy causes a FELLGOR RAVAGER operative to Frenzy at the end of its activation, are they incapacitated immediately, or at the end of their next activation?", "a": "At the end of their next activation."}],
  "canoptek": [{"q": "In a killzone that uses the close quarters rules, is the OBELISK NODE MATRIX measured through Wall terrain?", "a": "No."}, {"q": "If another CANOPTEK CIRCLE WARRIOR operative is set up as a result of the A Ceaseless Scuttling rule, does it count as a new operative for the purposes of other rules?", "a": "Yes."}, {"q": "How should I resolve it if I attempt to use a strategy ploy using the Nodal Response firefight ploy, but that strategy ploy is cancelled by an opponent's rule?", "a": "You can either use a different strategy ploy, or have the CP for both that strategy ploy and Nodal Response refunded."}, {"q": "When determining control from an OBELISK NODE marker using the GEOMANCER's Obelisk Node Control rule, do I use the GEOMANCER's APL stat to determine control?", "a": "No."}, {"q": "When OBELISK NODE markers are moved, are they affected by Accessible terrain, Obstructing terrain, climbing or dropping?", "a": "No, but note that they cannot move through Wall terrain."}, {"q": "In the example where all three OBELISK NODE markers are within 6\", is the \"area between\" these markers the entire triangle or just the 20mm wide lines directly between the markers?", "a": "The 20mm wide lines."}, {"q": "In close quarters killzones, how do I measure the horizontal area between my OBELISK NODE markers if there is Wall terrain partially intervening between them?", "a": "You cannot measure between your OBELISK NODE markers if Wall terrain is intervening. The OBELISK NODE MATRIX does not curve around walls, it must be a single straight line."}, {"q": "When using the Matrix Manipulator faction equipment, do I measure a 20mm wide line straight to the GEOMANCER's 50mm base, or a widening shape to all facing parts of its 50mm base?", "a": "A widening shape to all facing parts of its base."}, {"q": "If all three WARRIOR operatives are incapacitated, can I still set one up as a STRATEGIC GAMBIT using the A Ceaseless Scuttling rule?", "a": "Yes."}],
  "hernkyn": [],
  "vespid": [{"q": "If there are no enemy operatives within 8\" of a friendly VESPID STINGWING operative, do I need to spend a Communion point to target an enemy operative more than 8\" from it?", "a": "Yes."}, {"q": "In killzones that use the close quarters rules, does the VESPID STINGWING SWARMGUARD's torch zone for the Skytorch weapon rule bend around any Wall terrain that is intervening?", "a": "Yes."}]

  {id:"dw-disruptor",side:"mine",role:"Disruptor",name:"Disruptor Veteran",apl:"3",move:"7\"",save:"3+",wounds:"13",weapons:[{"name": "Marksman bolt carbine", "atk": "4", "hit": "3+", "dmg": "3/4", "wr": "Lethal 5+"}, {"name": "Fists", "atk": "4", "hit": "3+", "dmg": "3/4", "wr": "—"}],abilities:[{"name": "Advanced Omni-Scrambler", "desc": "<span class=\"desc-text\">STRATEGIC GAMBIT. Select one enemy operative visible to or within 6\" of this operative, then roll one D6. In the Firefight phase of this turning point, that enemy operative cannot be activated or perform actions until one of the following is true: your opponent has activated a number of enemy operatives equal to the result of the D6; or it's the last enemy operative to be activated.</span>"}, {"name": "Auspex Triangulation", "desc": "<span class=\"desc-text\">The Advanced Auspex Scan firefight ploy costs you 0CP when both of the following are true: this operative isn't within control range of enemy operatives; and the target of that Shoot action (primary target, if relevant) is visible to this operative. Note that it doesn't have to be this operative performing the Shoot action, and that any subsequent Shoot actions during that activation/counteraction must meet these same requirements (or that ploy has no effect on those subsequent Shoot actions).</span>"}]},

  {id:"ws-frosteye",side:"mine",role:"Frosteye",name:"Frosteye",apl:"3",move:"7\"",save:"3+",wounds:"13",weapons:[{"name": "Instigator bolt carbine", "atk": "4", "hit": "3+", "dmg": "3/4", "wr": "Piercing Crits 1, Silent"}, {"name": "Combat blade", "atk": "4", "hit": "3+", "dmg": "4/5", "wr": "—"}],abilities:[{"name": "Storm-veiled Execution", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative is within your STORM: it can perform the Guard action regardless of the killzone rules.</li><li class=\"desc-green\">It can perform the Guard action while it has a Conceal order.</li></ul>"}, {"name": "HUNTER'S SENSES", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">HUNTER'S SENSES</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Select one of the following rules for all profiles of this operative's instigator bolt carbine until the start of its next activation:</p><ul class=\"desc-list\" style=\"margin-top:6px\"><li class=\"desc-green\">Severe.</li><li class=\"desc-green\">Saturate, and whenever shooting with that weapon, enemy operatives cannot be obscured.</li></ul></div><ul class=\"desc-list\"><li class=\"desc-red\">Cannot perform while within control range of an enemy operative.</li></ul>", "unique": true}]},
  {id:"ws-gunner",side:"mine",role:"Gunner",name:"Gunner",apl:"3",move:"7\"",save:"3+",wounds:"13",weapons:[{"name": "Plasma gun (standard)", "atk": "4", "hit": "3+", "dmg": "4/6", "wr": "Piercing 1"}, {"name": "Plasma gun (supercharged)", "atk": "4", "hit": "3+", "dmg": "5/6", "wr": "Hot, Lethal 5+, Piercing 1"}, {"name": "Combat blade", "atk": "4", "hit": "3+", "dmg": "4/5", "wr": "—"}],abilities:[{"name": "Tempest's Fury", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative is within your STORM: all profiles of its plasma gun have the Punishing weapon rule.</li><li class=\"desc-green\">Its plasma gun (supercharge) does not have the Hot weapon rule.</li></ul>"}]},
  {id:"ws-hunter",side:"mine",role:"Hunter",name:"Hunter",apl:"3",move:"7\"",save:"3+",wounds:"13",weapons:[{"name": "Plasma pistol (standard)", "atk": "4", "hit": "3+", "dmg": "3/5", "wr": "Range 8\", Piercing 1"}, {"name": "Plasma pistol (supercharged)", "atk": "4", "hit": "3+", "dmg": "4/5", "wr": "Range 8\", Hot, Lethal 5+, Piercing 1"}, {"name": "Combat blade", "atk": "5", "hit": "3+", "dmg": "4/5", "wr": "—"}],abilities:[{"name": "Fierce Temperament", "desc": "<span class=\"desc-text\">Whenever this operative is within your STORM, its weapons have the Severe weapon rule.</span>"}]},

  {id:"ws-trapmaster",side:"mine",role:"Trapmaster",name:"Trapmaster",apl:"3",move:"7\"",save:"3+",wounds:"13",weapons:[{"name": "Plasma pistol (standard)", "atk": "4", "hit": "3+", "dmg": "3/5", "wr": "Range 8\", Piercing 1"}, {"name": "Plasma pistol (supercharged)", "atk": "4", "hit": "3+", "dmg": "4/5", "wr": "Range 8\", Hot, Lethal 5+, Piercing 1"}, {"name": "Combat blade", "atk": "5", "hit": "3+", "dmg": "4/5", "wr": "—"}],abilities:[{"name": "Haywire Mine", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">This operative carries your Haywire Mine marker. It can perform the Pick Up Marker action on it.</li><li class=\"desc-red\">That marker cannot be placed within another operative's control range. If this operative is incapacitated while carrying it and it cannot be placed, it is removed with this operative.</li></ul>"}, {"name": "Proximity Mine", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">The first time your Haywire Mine marker is within another operative's control range, remove the marker, subtract 1 from that operative's APL until the end of its next activation, and inflict 2D3+3 damage on it (or D3+6 if within 6\" of your Storm marker).</li><li class=\"desc-green\">If it isn't incapacitated, end its action (if any), even if that action's effects aren't fulfilled.</li><li class=\"desc-green\">If it cannot be placed, move it the minimum amount to do so.</li><li class=\"desc-green\">Note that this operative is ignored for these effects (i.e. it cannot set it off or take damage from that marker).</li></ul>"}]},
  {id:"ws-wolf",side:"mine",role:"Fenrisian Wolf",name:"Fenrisian Wolf",apl:"2",move:"8\"",save:"5+",wounds:"9",weapons:[{"name": "Fangs", "atk": "5", "hit": "3+", "dmg": "4/5", "wr": "Rending"}],abilities:[{"name": "Instinctive Predator", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Can only perform: Charge, Dash, Fall Back, Fight, Guard and Reposition. Cannot use any weapons not on its datacard.</li><li class=\"desc-green\">Can perform the Charge action while it has a Conceal order.</li></ul>"}, {"name": "Pounce", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle STRATEGIC GAMBIT. If this operative's APL stat is 2 or more, it can perform a free Charge, Fall Back or Reposition action.</li><li class=\"desc-red\">Until the end of its next activation, subtract 1 from its APL stat and it cannot perform the aforementioned actions.</li></ul>"}]}

const CANOPTEK = [
  {id:"cc-geomancer",side:"mine",role:"Leader (Cryptek)",name:"Geomancer",apl:"3",move:"6\"",save:"3+",wounds:"14",weapons:[{"name": "Tremorglaive (part matter)", "atk": "4", "hit": "3+", "dmg": "4/5", "wr": "Piercing 1, Piercing Crits 2"}, {"name": "Tremorglaive (quake)", "atk": "5", "hit": "3+", "dmg": "1/2", "wr": "Blast 2\", Seek Light, Stun"}, {"name": "Tremorglaive (sweep)", "atk": "4", "hit": "4+", "dmg": "4/5", "wr": "Severe, Shock, Stun"}],abilities:[{"name": "Obelisk Node Control", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative would perform a mission action (excluding Retrieve) requiring it to control an objective marker, you can instead determine control from one of your OBELISK NODE markers.</li><li class=\"desc-green\">Whenever this operative would perform the Operate Hatch action, you can open or close a hatchway whose access point is within 1\" of one of your OBELISK NODE markers.</li><li class=\"desc-red\">Must still fulfil the Operate Hatch action's conditions.</li></ul>"}, {"name": "GEOMANTIC DISTURBANCE", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">GEOMANTIC DISTURBANCE</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Select a point on a terrain feature visible to and within 8\". Separately roll 2D6 for each operative within 2\" of that point. If the result is higher than that operative's remaining wounds, inflict damage equal to the difference.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">Cannot perform while Concealed or within control range of an enemy operative.</li></ul>", "unique": true}, {"name": "CANOPTEK CONTROL", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">CANOPTEK CONTROL</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">SUPPORT. Select one friendly CANOPTEK operative visible to and within 6\" of this operative. Alternatively, you can select one friendly CANOPTEK CIRCLE CANOPTEK operative that's visible to this operative and within your OBELISK NODE MATRIX (SUPPORT doesn't apply to this selection). That operative can immediately perform a 1AP action for free — cannot move more than 2\" during that action.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">Cannot perform while within control range of an enemy operative or while counteracting.</li></ul>", "unique": true}, {"name": "MOLECULAR BREACH", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">MOLECULAR BREACH</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">SUPPORT. Select one friendly CANOPTEK CIRCLE operative visible to and within 6\" of this operative or one visible to this operative and within your OBELISK NODE MATRIX (SUPPORT doesn't apply to this selection). The next time it performs an action involving movement, instead remove it from the killzone and set it up within a distance equal to its Move stat horizontally (or 3\" if it was Dash). In a killzone that uses the close quarters rules, this distance can be measured over and through Wall terrain and the operative can be set up on the other side).</p></div><ul class=\"desc-list\"><li class=\"desc-red\">Note that it gains no additional distance when performing the Charge action. It must be set up in a location it can be placed, and unless it's the Charge action, it cannot be set up within control range of an enemy operative.</li><li class=\"desc-red\">This operative cannot perform this action while within control range of an enemy operative.</li></ul>", "unique": true}]},
  {id:"cc-accelerator",side:"mine",role:"Accelerator",name:"Canoptek Accelerator",apl:"2",move:"7\"",save:"4+",wounds:"7",weapons:[{"name": "Spark", "atk": "4", "hit": "4+", "dmg": "2/3", "wr": "Range 4\", Piercing 1"}, {"name": "Claws & spark", "atk": "3", "hit": "4+", "dmg": "3/4", "wr": "Lethal 5+, Stun"}],abilities:[{"name": "OVERCHARGE", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">OVERCHARGE</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Select one other friendly CANOPTEK operative visible to and within 3\" of this operative. Alternatively, if this operative is within your OBELISK NODE MATRIX, you can select one other friendly CANOPTEK CIRCLE CANOPTEK operative within your OBELISK NODE MATRIX. Until the end of that selected operative's next activation, add 1 to its APL stat.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">This operative cannot perform this action while within control range of an enemy operative.</li></ul>", "unique": true}, {"name": "CRANIAL OVERLOAD", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">CRANIAL OVERLOAD</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Select one enemy operative visible to and within 3\" of this operative. Alternatively, if this operative is within your OBELISK NODE MATRIX, you can select one enemy operative within your OBELISK NODE MATRIX. Until the end of that enemy operative's next activation, subtract 1 from its APL stat.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">This operative cannot perform this action while within control range of an enemy operative.</li></ul>", "unique": true}]},
  {id:"cc-reanimator",side:"mine",role:"Reanimator",name:"Canoptek Reanimator",apl:"2",move:"7\"",save:"4+",wounds:"7",weapons:[{"name": "Atomiser beam", "atk": "4", "hit": "4+", "dmg": "3/4", "wr": "Range 6\", Lethal 5+"}, {"name": "Claws & tail", "atk": "4", "hit": "4+", "dmg": "3/4", "wr": "—"}],abilities:[{"name": "Reanimate", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when another friendly CANOPTEK CIRCLE operative would be incapacitated, if it is visible to and within 6\" of this operative (or both are within your OBELISK NODE MATRIX), and neither is within control range of an enemy operative: that operative is not incapacitated, has 1 wound remaining, cannot be incapacitated for the remainder of the action, and can perform a free Dash ending within this operative's control range or within your OBELISK NODE MATRIX.</li><li class=\"desc-red\">Subtract 1 from both operatives' APL stats until end of their next activations. If used during that operative's own activation, that activation ends.</li><li class=\"desc-red\">Cannot use if this operative is incapacitated, or if it's a Shoot action and this operative would be a primary or secondary target.</li></ul>"}, {"name": "NANOSCARAB BEAM", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">NANOSCARAB BEAM</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Select one friendly CANOPTEK CIRCLE operative visible to and within 6\" of this operative. Alternatively, if this operative is within your OBELISK NODE MATRIX, you can select one other friendly CANOPTEK CIRCLE operative within your OBELISK NODE MATRIX. The selected operative regains up to 3D3 lost wounds.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">Cannot be used on an operative the Reanimate rule was used on this turning point.</li><li class=\"desc-red\">This operative cannot perform this action while within control range of an enemy operative, or more than once per turning point.</li></ul>", "unique": true}]},
  {id:"cc-warrior",side:"mine",role:"Warrior",name:"Canoptek Warrior",apl:"2",move:"7\"",save:"4+",wounds:"7",weapons:[{"name": "Gauss scalpel", "atk": "4", "hit": "4+", "dmg": "2/3", "wr": "Lethal 5+, Piercing 1"}, {"name": "Tesla caster (focused)", "atk": "4", "hit": "4+", "dmg": "2/3", "wr": "—"}, {"name": "Tesla caster (living lightning)", "atk": "4", "hit": "4+", "dmg": "2/3", "wr": "Blast 2\""}, {"name": "Claws & tail", "atk": "3", "hit": "4+", "dmg": "3/4", "wr": "—"}],abilities:[{"name": "Aggressive Defence", "desc": "<span class=\"desc-text\">If this operative is incapacitated by an enemy operative within 2\" of it, before this operative is removed from the killzone, roll one D3: on a 2+, inflict 1 damage on that enemy operative.</span>"}, {"name": "Expendable Construct", "desc": "<span class=\"desc-text\">This operative is ignored for your opponent's kill/elimination op. It's also ignored for victory conditions and scoring VPs if either require operatives to 'escape', 'survive' or be incapacitated by enemy operatives.</span>"}, {"name": "A Ceaseless Scuttling", "desc": "<span class=\"desc-text\">As a STRATEGIC GAMBIT in each turning point after the first, if you have less than three non-incapacitated friendly CANOPTEK CIRCLE WARRIOR operatives, you can set up another one ready and with a Conceal order wholly within your drop zone (you can select its weapon options as normal).</span>"}]},
  {id:"cc-tombcrawler",side:"mine",role:"Tomb Crawler",name:"Tomb Crawler",apl:"2",move:"5\"",save:"3+",wounds:"18",weapons:[{"name": "Transdimensional isolator", "atk": "5", "hit": "4+", "dmg": "5/6", "wr": "Dimensional Banishment*"}, {"name": "Twin gauss reapers (focused)", "atk": "5", "hit": "4+", "dmg": "4/5", "wr": "Piercing 1, Severe"}, {"name": "Twin gauss reapers (sweeping)", "atk": "4", "hit": "4+", "dmg": "4/5", "wr": "Piercing 1, Severe, Torrent 1\""}, {"name": "Claws", "atk": "4", "hit": "4+", "dmg": "4/4", "wr": "—"}],abilities:[{"name": "*Dimensional Banishment", "desc": "<span class=\"desc-text\">After this operative uses this weapon, if you inflicted damage or retained any critical successes, if the target wasn't incapacitated, roll 2D6: if the result is higher than the target's remaining wounds, the target is incapacitated (taking precedence over rules that prevent incapacitation, e.g. Medic!, FELLGOR RAVAGER Frenzy) and your opponent cannot place a Reanimation marker (HIEROTEK CIRCLE) for that operative, if relevant.</span>"}, {"name": "Weapon Sentinel", "desc": "<span class=\"desc-text\">Whenever your opponent is selecting a valid target, if this operative has a Conceal order, it cannot use Light terrain for cover. While this can allow this operative to be targeted (assuming it's visible), it doesn't remove its cover save (if any).</span>"}, {"name": "Steadfast", "desc": "<span class=\"desc-text\">Whenever determining control of a marker, you can treat this operative's APL stat as 3. If you do, this takes precedence over all other rules, meaning any changes to its APL stat are ignored for this.</span>"}]}
];

  {id:"hy-gunner",side:"mine",role:"Gunner",name:"Yaegir Gunner",apl:"2",move:"5\"",save:"4+",wounds:"8",weapons:[{"name": "APM launcher (armour piercing)", "atk": "5", "hit": "4+", "dmg": "4/5", "wr": "Heavy (Reposition only), Piercing 1, Bipod*"}, {"name": "APM launcher (breaching)", "atk": "5", "hit": "4+", "dmg": "3/5", "wr": "Blast 2\", Heavy (Reposition only), Bipod*"}, {"name": "APM launcher (high explosive)", "atk": "5", "hit": "4+", "dmg": "2/4", "wr": "Blast 3\", Heavy (Reposition only), Bipod*"}, {"name": "Fists", "atk": "3", "hit": "4+", "dmg": "2/3", "wr": "—"}],abilities:[{"name": "*Bipod", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative is shooting with this weapon, if it hasn't moved during the activation, or if it's a counteraction, this weapon has the Ceaseless weapon rule.</li><li class=\"desc-red\">Note: this operative is not restricted from moving after shooting.</li></ul>"}]},
  {id:"hy-ironbraek",side:"mine",role:"Ironbraek",name:"Yaegir Ironbraek",apl:"2",move:"5\"",save:"4+",wounds:"8",weapons:[{"name": "Bolt revolver", "atk": "4", "hit": "4+", "dmg": "3/5", "wr": "Range 8\""}, {"name": "Entrencher", "atk": "3", "hit": "4+", "dmg": "3/4", "wr": "—"}],abilities:[{"name": "Minefield", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">You have five Minefield markers for the battle. Three are HY-Pex mines (reverse-side) and two are blank. Set up all reverse-side down, more than 2\" from other markers and access points and Accessible terrain, and more than 6\" from opponent's drop zone and other Minefield markers.</li><li class=\"desc-green\">Whenever this operative is readied and not within control range of enemy operatives, you can reset one flipped Minefield marker within its control range.</li></ul>"}, {"name": "HY-Pex Mines", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever one of your reverse-side down Minefield markers is within an enemy operative's control range (and not a friendly's), flip it. If a blank: no effect. If a HY-Pex mine: inflict 3 damage and roll D6 \u2014 if less than that operative's Save stat, inflict additional damage equal to the dice result. End its action regardless of result. Regardless, that marker isn't removed.</li></ul>"}]},
  {id:"hy-riflekyn",side:"mine",role:"Riflekyn",name:"Yaegir Riflekyn",apl:"2",move:"5\"",save:"4+",wounds:"8",weapons:[{"name": "Magna-coil rifle (concealed)", "atk": "4", "hit": "2+", "dmg": "3/3", "wr": "Devastating 3, Heavy, Piercing 1, Silent, Concealed Position*"}, {"name": "Magna-coil rifle (mobile)", "atk": "4", "hit": "3+", "dmg": "3/4", "wr": "Heavy (Reposition only), Piercing 1"}, {"name": "Magna-coil rifle (stationary)", "atk": "4", "hit": "2+", "dmg": "3/3", "wr": "Devastating 3, Heavy, Piercing 1"}, {"name": "Fists", "atk": "3", "hit": "4+", "dmg": "2/3", "wr": "—"}],abilities:[{"name": "*Concealed Position", "desc": "<span class=\"desc-text\">This operative can only use this weapon the first time it performs the Shoot action during the battle.</span>"}, {"name": "Weavewërke Cloak", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting this operative: ignore the Saturate weapon rule.</li><li class=\"desc-green\">If you can retain any cover saves, you can retain one additional cover save, or retain one cover save as a critical success instead.</li><li class=\"desc-red\">Not cumulative with improved cover saves from Vantage terrain.</li></ul>"}]},
  {id:"hy-tracker",side:"mine",role:"Tracker",name:"Yaegir Tracker",apl:"2",move:"5\"",save:"4+",wounds:"8",weapons:[{"name": "SiNR handbow", "atk": "4", "hit": "4+", "dmg": "3/5", "wr": "Silent"}, {"name": "Throwing hatchet", "atk": "4", "hit": "3+", "dmg": "3/5", "wr": "Range 6\", Limited 1, Rending, Silent"}, {"name": "Hatchet", "atk": "4", "hit": "3+", "dmg": "4/5", "wr": "—"}],abilities:[{"name": "Pan Spectral Visor", "desc": "<span class=\"desc-text\">Whenever this operative is shooting an operative within 6\" of it:</span><ul class=\"desc-list\"><li class=\"desc-green\">This operative's weapons have the Seek Light weapon rule.</li><li class=\"desc-green\">That operative cannot be obscured.</li></ul>"}, {"name": "Tracker", "desc": "<span class=\"desc-text\">Whenever this operative is shooting against or fighting against an expended operative within 6\" of it, this operative's weapons have the Punishing weapon rule.</span>"}]},

const VESPID = [
  {id:"vs-strainleader",side:"mine",role:"Leader",name:"Vespid Strain Leader",apl:"2",move:"6\"",save:"5+",wounds:"10",weapons:[{"name": "Neutron blaster", "atk": "4", "hit": "3+", "dmg": "3/3", "wr": "Devastating 2"}, {"name": "Claws", "atk": "3", "hit": "4+", "dmg": "3/4", "wr": "—"}],abilities:[{"name": "Communion Helm", "desc": "<span class=\"desc-text\">Once during each of this operative's activations, you can spend 1 Communion point for free.</span>"}, {"name": "Commune", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">When selecting your operatives for the battle, also select one VESPID STINGWING strategy ploy.</li><li class=\"desc-green\">Whenever this operative is in the killzone and not within control range of enemy operatives, that ploy costs you 0CP.</li></ul>"}]},

  {id:"vs-longsting",side:"mine",role:"Longsting",name:"Vespid Longsting",apl:"2",move:"6\"",save:"5+",wounds:"9",weapons:[{"name": "Neutron rail rifle (standard)", "atk": "4", "hit": "4+", "dmg": "4/4", "wr": "Devastating 2, Neutron Fragment*"}, {"name": "Neutron rail rifle (aimed)", "atk": "4", "hit": "3+", "dmg": "4/4", "wr": "Devastating 2, Heavy (Dash only), Lethal 5+, Neutron Fragment*"}, {"name": "Claws", "atk": "3", "hit": "4+", "dmg": "3/4", "wr": "—"}],abilities:[{"name": "*Neutron Fragment", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">If the target is not incapacitated but you resolve any attack dice against it, that enemy operative gains one of your Neutron Fragment tokens.</li><li class=\"desc-green\">Whenever an operative with one of your Neutron Fragment tokens is activated, inflict D3 damage on it for each Neutron Fragment token it has (roll separately for each).</li></ul>"}]},

var ALL = {murderwing:MINE, raveners:RAVENERS, xv26:XV26, hearthkyn:HEARTHKYN, goremonger:GOREMONGER,deathwatch:DEATHWATCH,'wolf-scouts':WOLF_SCOUTS,canoptek:CANOPTEK,hernkyn:HERNKYN,vespid:VESPID};
var activeTab='mine', mineFac='murderwing', enemyFac='raveners';
var selected={}, selCnt=0, eqTaken={}, eqOrd={}, eqCnt=0, ployTP={}, wpnOn={};

/* ── LOCALSTORAGE PERSISTENCE ── */
var STORAGE_KEY = 'ktviewer_state_v2';
function saveState() {
  try {
    var data = {
      selected: selected, selCnt: selCnt,
      eqTaken: eqTaken, eqOrd: eqOrd, eqCnt: eqCnt,
      ployTP: ployTP, wpnOn: wpnOn,
      mineFac: (typeof mineFac !== 'undefined' ? mineFac : null),
      enemyFac: (typeof enemyFac !== 'undefined' ? enemyFac : null)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (err) { /* storage unavailable or full — ignore */ }
}
function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    var d = JSON.parse(raw);
    if (d.selected) selected = d.selected;
    if (typeof d.selCnt === 'number') selCnt = d.selCnt;
    if (d.eqTaken) eqTaken = d.eqTaken;
    if (d.eqOrd) eqOrd = d.eqOrd;
    if (typeof d.eqCnt === 'number') eqCnt = d.eqCnt;
    if (d.ployTP) ployTP = d.ployTP;
    if (d.wpnOn) wpnOn = d.wpnOn;
    return d;
  } catch (err) { return null; }
}

/* ── EVENT DELEGATION ── */
document.addEventListener('click', function(e) {
  var t = e.target;

  // Number badge on unit card
  if (t.classList.contains('card-num')) {
    e.stopPropagation();
    var uid = t.id.replace('n-', '');
    var u = findUnit(uid);
    if (u) toggleSel(u, uid);
    return;
  }
  // Close overlays on backdrop only
  if (t.classList.contains('overlay')) {
    t.classList.remove('open');
    return;
  }
  // Close unit overlay on tap anywhere inside ov-inner EXCEPT wpn-table and controls
  var inOvInner = t.closest('#overlay .ov-inner');
  if (inOvInner && !t.closest('.wpn-table') && !t.closest('.close-btn') && !t.closest('.card-num') && !t.closest('.wpn-check')) {
    document.getElementById('overlay').classList.remove('open');
    return;
  }
  // Close buttons
  if (t.classList.contains('close-btn')) {
    var ov = t.closest('.overlay');
    if (ov) ov.classList.remove('open');
    return;
  }
  // Stop propagation inside overlay content
  if (t.closest('.ov-inner')) {
    // handled below specifically
  }
  // TP dot — must check BEFORE rules-item-header since dots live inside it
  var tpEl2 = t.closest('.tp-dot');
  if (tpEl2) {
    e.stopPropagation();
    var uid2 = tpEl2.getAttribute('data-uid');
    var tp2 = parseInt(tpEl2.getAttribute('data-tp'));
    var type2 = tpEl2.getAttribute('data-type');
    if (!ployTP[uid2]) ployTP[uid2] = {};
    if (ployTP[uid2][tp2]) { delete ployTP[uid2][tp2]; tpEl2.className = 'tp-dot'; }
    else { ployTP[uid2][tp2] = true; tpEl2.className = 'tp-dot used-' + type2; }
    saveState();
    return;
  }
  // Accordion toggle (rules-item-header, eq-item-header)
  var rh = t.closest('.rules-item-header');
  if (rh) {
    e.stopPropagation();
    var item = rh.closest('.rules-item');
    if (item) item.classList.toggle('open');
    return;
  }
  var eh = t.closest('.eq-item-header');
  if (eh) {
    e.stopPropagation();
    // If click was on eq-num, handle EQ toggle
    if (t.classList.contains('eq-num') || t.closest('.eq-num')) {
      var numEl = t.classList.contains('eq-num') ? t : t.closest('.eq-num');
      var eqEl = numEl.closest('.eq-item');
      if (eqEl) togEq(eqEl.id);
      return;
    }
    var eqItem = eh.closest('.eq-item');
    if (eqItem) eqItem.classList.toggle('open');
    return;
  }

  // Weapon checkbox
  if (t.classList.contains('wpn-check')) {
    e.stopPropagation();
    var uid3 = t.getAttribute('data-uid');
    var idx = parseInt(t.getAttribute('data-i'));
    wpnOn[uid3][idx] = !wpnOn[uid3][idx];
    var row = document.getElementById('wr-' + uid3 + '-' + idx);
    if (wpnOn[uid3][idx]) { if(row) row.classList.remove('dimmed'); t.classList.add('on'); }
    else { if(row) row.classList.add('dimmed'); t.classList.remove('on'); }
    saveState();
    return;
  }
  // Unit card
  var card = t.closest('.card');
  if (card && !t.closest('.card-num')) {
    var cuid = card.id.replace('c-', '');
    var cu = findUnit(cuid);
    if (cu) openUnit(cu);
    return;
  }
});

/* Toolbar buttons use simple onclick strings that don't need ID params — keep those */

function findUnit(uid) {
  var parts = uid.split('-');
  var side = parts[0];
  var id = parts.slice(1).join('-');
  var fac = side === 'mine' ? mineFac : enemyFac;
  var units = ALL[fac] || [];
  for (var i = 0; i < units.length; i++) {
    if (units[i].id === id) return Object.assign({}, units[i], {side: side});
  }
  // Search all factions if not found in current
  var allKeys = Object.keys(ALL);
  for (var fi = 0; fi < allKeys.length; fi++) {
    var fu = ALL[allKeys[fi]] || [];
    for (var ui = 0; ui < fu.length; ui++) {
      if (fu[ui].id === id) return Object.assign({}, fu[ui], {side: side});
    }
  }
  return null;
}

function showGrid(side, fac) {
  var cont = document.getElementById(side==='mine'?'mine-grids':'enemy-grids');
  [].forEach.call(cont.children, function(c){ c.style.display='none'; });
  var ex = document.getElementById('g-'+side+'-'+fac);
  if (ex) { ex.style.display=''; return; }
  var g = document.createElement('div');
  g.className = 'grid'; g.id = 'g-'+side+'-'+fac;
  (ALL[fac]||[]).forEach(function(u){ g.appendChild(mkCard(Object.assign({},u,{side:side}))); });
  cont.appendChild(g);
  // Restore any saved selection visuals for this faction's cards
  (ALL[fac]||[]).forEach(function(u){
    var uid = side+'-'+u.id;
    if (selected[uid] !== undefined) {
      var card = document.getElementById('c-'+uid);
      if (card) card.classList.add('selected');
      updN(uid);
    }
  });
  reord(side);
}

function mkCard(u) {
  var uid = u.side+'-'+u.id;
  var d = document.createElement('div');
  d.className = 'card '+u.side; d.id = 'c-'+uid;
  var sr = '';
  ['APL','MOV','SV','W'].forEach(function(k,i){
    sr += '<div class="sm"><span>'+k+'</span><span>'+[u.apl,u.move,u.save,u.wounds][i]+'</span></div>';
  });
  d.innerHTML =
    '<div class="card-num" id="n-'+uid+'"></div>'+
    '<div class="card-role">'+u.role+'</div>'+
    '<div class="card-name'+(u.name.length>15?' long':'')+'">'+u.name+'</div>'+
    '<div class="stat-row">'+sr+'</div>'+
    '<div class="card-pills"><span class="pill w">W '+u.wounds+'</span><span class="pill sv">Sv '+u.save+'</span></div>';
  return d;
}

function toggleSel(u, uid) {
  var c = document.getElementById('c-'+uid);
  var side = u.side;
  var prefix = side + '-';
  if (selected[uid] !== undefined) {
    var n = selected[uid]; delete selected[uid];
    // Renumber only within the same side
    Object.keys(selected).forEach(function(id){
      if (id.indexOf(prefix)===0 && selected[id]>n){ selected[id]--; updN(id); }
    });
    if(c) c.classList.remove('selected'); updN(uid);
  } else {
    // Next number = count of currently selected on this side + 1
    var cnt = 0;
    Object.keys(selected).forEach(function(id){ if(id.indexOf(prefix)===0) cnt++; });
    selected[uid] = cnt + 1;
    if(c) c.classList.add('selected'); updN(uid);
  }
  reord(u.side);
  saveState();
}
function updN(uid) { var e=document.getElementById('n-'+uid); if(e) e.textContent=selected[uid]!==undefined?selected[uid]:''; }
function reord(side) {
  var fac = side==='mine'?mineFac:enemyFac;
  var g = document.getElementById('g-'+side+'-'+fac); if(!g) return;
  var cs = Array.from(g.children);
  var sel = cs.filter(function(c){ return c.classList.contains('selected'); })
              .sort(function(a,b){ return (selected[a.id.replace('c-','')]||999)-(selected[b.id.replace('c-','')]||999); });
  var un = cs.filter(function(c){ return !c.classList.contains('selected'); });
  sel.concat(un).forEach(function(c){ g.appendChild(c); });
}

function formatDesc(text) {
  if (!text) return text;
  // If desc already contains HTML tags (pre-formatted), return as-is
  if (/<[a-z]/i.test(text)) return text;

  // Patterns that suggest a list structure:
  // 1. Text containing ": " followed by multiple clauses separated by "; "
  // 2. Text with "WHEN:" / "EFFECT:" labels
  // 3. Single long text — just return as-is with no bullets

  var restrictWords = /^(Cannot|cannot|Only|only|If you cannot|Not when|not when|Do not|does not|This operative cannot|Note:|Exception|Limit)/;

  // Split on newlines first, then on "; " if result has 2+ parts
  var parts = [];

  // Check for WHEN/EFFECT pattern
  if (/WHEN\s*:/.test(text) || /EFFECT\s*:/.test(text)) {
    parts = text.split(/(?=WHEN|EFFECT)/);
  }
  // Check for numbered/lettered list like (A) (B) or 1. 2.
  else if (/\([A-D]\)/.test(text)) {
    parts = text.split(/(?=\([A-D]\))/);
  }
  // Check for sentences separated by ". " where each is substantial
  else {
    var sents = text.split(/\.\s+(?=[A-Z])/);
    if (sents.length >= 3) {
      parts = sents.map(function(s, i) { return i < sents.length-1 ? s+'.' : s; });
    }
  }

  if (parts.length < 2) return '<span class="desc-text">' + text + '</span>';

  var html = '<ul class="desc-list">';
  parts.forEach(function(p) {
    p = p.trim();
    if (!p) return;
    var isRed = restrictWords.test(p) || /Cannot|cannot/.test(p) && !/^Whenever/.test(p);
    html += '<li class="' + (isRed ? 'desc-red' : 'desc-green') + '">' + p + '</li>';
  });
  html += '</ul>';
  return html;
}

function openUnit(u) {
  var uid = u.side+'-'+u.id;
  var ac = u.side==='enemy'?'enemy':'';
  document.getElementById('ov-role').textContent = u.role;
  document.getElementById('ov-role').style.color = u.side==='enemy'?'var(--teal)':'var(--accent)';
  document.getElementById('ov-name').textContent = u.name;
  document.getElementById('ov-badges').innerHTML =
    '<span class="badge-apl '+ac+'">APL '+u.apl+'</span>'+
    '<span class="badge-w">W '+u.wounds+'</span>'+
    '<span class="badge-sv">Sv '+u.save+' / Move '+u.move+'</span>';
  if (!wpnOn[uid]) { wpnOn[uid]={}; u.weapons.forEach(function(w,i){ wpnOn[uid][i]=true; }); }
  var h = '<div class="sec-label '+ac+'">Weapons</div><table class="wpn-table">'+
    '<tr><th></th><th>Name</th><th>ATK</th><th>HIT</th><th>DMG</th><th>Rules</th></tr>';
  u.weapons.forEach(function(w,i){
    var on = wpnOn[uid][i]!==false;
    h += '<tr class="wpn-row'+(on?'':' dimmed')+'" id="wr-'+uid+'-'+i+'">'+
      '<td><div class="wpn-check'+(on?' on':'')+'" data-uid="'+uid+'" data-i="'+i+'"></div></td>'+
      '<td>'+w.name+'</td><td class="num">'+w.atk+'</td><td class="num">'+w.hit+
      '</td><td class="num">'+w.dmg+'</td><td class="wpn-wr">'+w.wr+'</td></tr>';
  });
  h += '</table>';
  if (u.abilities && u.abilities.length) {
    h += '<div class="sec-label '+ac+'">Abilities</div><div class="abilities">';
    u.abilities.forEach(function(a){
      h += '<div class="ability'+(a.unique?' unique':'')+'"><div class="ability-name">'+a.name+'</div><div class="ability-desc">'+formatDesc(a.desc)+'</div></div>';
    });
    h += '</div>';
  }
  document.getElementById('ov-body').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); }

function secLbl(t){ return '<div class="sec-label neutral">'+t+'</div>'; }

function ruleIt(id, name, nc, desc, tpUid, tpType) {
  var dots = '';
  if (tpUid) {
    var used = ployTP[tpUid]||{};
    dots = '<div class="tp-dots">';
    for (var tp=1; tp<=4; tp++) {
      dots += '<div class="tp-dot'+(used[tp]?' used-'+tpType:'')+'" data-uid="'+tpUid+'" data-tp="'+tp+'" data-type="'+tpType+'">'+tp+'</div>';
    }
    dots += '</div>';
  }
  return '<div class="rules-item" id="'+id+'">'+
    '<div class="rules-item-header">'+
      '<span class="rules-item-name '+nc+'">'+name+'</span>'+dots+
      '<span class="rules-item-chevron">&#9658;</span>'+
    '</div><div class="rules-item-body">'+formatDesc(desc)+'</div></div>';
}

function openRules(side) {
  var fkey = side==='mine'?mineFac:enemyFac;
  var d = FACTION_RULES[fkey]; if(!d) return;

function openEq(side) {
  var fkey = side==='mine'?mineFac:enemyFac;
  var d = FACTION_EQ[fkey], r = FACTION_RULES[fkey]; if(!d) return;
  document.getElementById('eq-sub').textContent = r?r.subtitle:'';
  document.getElementById('eq-sub').style.color = r?r.color:'var(--muted)';

  reordEq();

function togEq(uid) {
  var el = document.getElementById(uid); if(!el) return;
  var side = uid.indexOf('enemy-')===0 ? 'enemy-' : 'mine-';
  if (eqTaken[uid]) {
    var n = eqOrd[uid]; delete eqTaken[uid]; delete eqOrd[uid];
    // Renumber only within the same side
    Object.keys(eqOrd).forEach(function(id){
      if (id.indexOf(side)===0 && eqOrd[id]>n){ eqOrd[id]--; updEq(id); }
    });
    el.classList.remove('taken'); updEq(uid);
  } else {
    var cnt = 0;
    Object.keys(eqOrd).forEach(function(id){ if(id.indexOf(side)===0) cnt++; });
    eqTaken[uid]=true; eqOrd[uid]=cnt+1;
    el.classList.add('taken'); updEq(uid);
  }
  reordEq();
  saveState();
}
function updEq(uid) {
  var el = document.getElementById(uid); if(!el) return;
  var b = el.querySelector('.eq-num'); if(b) b.textContent = eqOrd[uid]!==undefined?eqOrd[uid]:'';
}
function reordEq() {
  var b = document.getElementById('eq-body'); if(!b) return;
  var items = Array.from(b.querySelectorAll('.eq-item'));
  var tk = items.filter(function(e){ return e.classList.contains('taken'); })
                .sort(function(a,b){ return (eqOrd[a.id]||999)-(eqOrd[b.id]||999); });
  var un = items.filter(function(e){ return !e.classList.contains('taken'); });
  tk.concat(un).forEach(function(e){ b.appendChild(e); });
}
function closeEq(){ document.getElementById('eq-overlay').classList.remove('open'); }

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('panel-mine').classList.toggle('active', tab==='mine');
  document.getElementById('panel-enemy').classList.toggle('active', tab==='enemy');
  document.getElementById('tab-mine').className = 'tab'+(tab==='mine'?' active-mine':'');
  document.getElementById('tab-enemy').className = 'tab'+(tab==='enemy'?' active-enemy':'');
}
function switchMineFaction(f){ mineFac=f; showGrid('mine',f); saveState(); }
function switchEnemyFaction(f){ enemyFac=f; showGrid('enemy',f); saveState(); }

/* ── INIT: restore saved state or use defaults ── */
var _saved = loadState();
var _mineFac = (_saved && _saved.mineFac) ? _saved.mineFac : 'murderwing';
var _enemyFac = (_saved && _saved.enemyFac) ? _saved.enemyFac : 'raveners';
mineFac = _mineFac; enemyFac = _enemyFac;
// Sync dropdown selectors to restored factions if present
(function(){
  var ms = document.getElementById('mine-select');
  var es = document.getElementById('enemy-select');
  if (ms) ms.value = _mineFac;
  if (es) es.value = _enemyFac;
})();
showGrid('mine', _mineFac);
showGrid('enemy', _enemyFac);
