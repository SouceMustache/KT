<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kill Team">
<meta name="theme-color" content="#0b0e15">
<title>Kill Team - Viewer</title>
<style>:root{--bg:#0b0e15;--surf:#131720;--card:#181e2c;--border:#252d40;--accent:#e03030;--accent2:#ff6b35;--teal:#3ab8a0;--teal2:#5dd4be;--text:#e8eaf0;--muted:#7a8199;--gold:#d4a843;--blue:#6ab0ff;--orange:#ffb07a;--overlay:rgba(6,8,14,0.97);--tab-h:88px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:80px}
header{background:linear-gradient(180deg,#07090f 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:14px 14px 0;position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-top h1{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex}
.tab{flex:1;height:52px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;-webkit-user-select:none}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .15s}
.tab.active-mine{color:var(--accent);border-color:var(--accent)}.tab.active-mine .dot{background:var(--accent)}
.tab.active-enemy{color:var(--teal);border-color:var(--teal)}.tab.active-enemy .dot{background:var(--teal)}
.panel{display:none}.panel.active{display:block}
.panel-toolbar{display:flex;align-items:center;gap:7px;padding:10px 10px 6px;position:sticky;top:var(--tab-h);z-index:15;background:var(--bg);border-bottom:1px solid var(--border)}
.dropdown-wrap{position:relative;flex:1;min-width:0}
.faction-select{width:100%;background:var(--surf);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:8px 28px 8px 10px;border-radius:9px;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none}
.dropdown-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none}
.toolbar-btn{background:var(--surf);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 10px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;-webkit-user-select:none;display:flex;align-items:center;gap:4px;flex-shrink:0}
.toolbar-btn:active{border-color:var(--teal);color:var(--teal)}.toolbar-btn.mine:active{border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:6px 10px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 12px 10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,transform .1s;-webkit-user-select:none}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .15s}
.card.mine::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.card.enemy::before{background:linear-gradient(90deg,var(--teal),var(--teal2))}
.card:active{transform:scale(0.97)}
.card.mine.selected{border-color:var(--accent);background:rgba(224,48,48,.08)}.card.mine.selected::before{opacity:1}
.card.enemy.selected{border-color:var(--teal);background:rgba(58,184,160,.08)}.card.enemy.selected::before{opacity:1}
.card-num{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent;transition:all .15s;z-index:2;cursor:pointer}
.card.mine.selected .card-num{background:var(--accent);border-color:var(--accent);color:#fff}
.card.enemy.selected .card-num{background:var(--teal);border-color:var(--teal);color:#fff}
.card-role{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.card-name{font-size:15px;font-weight:800;line-height:1.15;letter-spacing:-.01em;color:var(--text);padding-right:34px}
.card-name.long{font-size:12px}
.stat-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.sm{font-size:10px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:22px}
.sm span:first-child{font-size:8px;font-weight:700;letter-spacing:.05em;color:var(--accent)}
.card.enemy .sm span:first-child{color:var(--teal)}
.sm span:last-child{font-size:13px;font-weight:800;color:var(--text)}
.card-pills{display:flex;gap:6px;margin-top:8px}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--surf);color:var(--muted)}
.pill.w{color:#e07070}.pill.sv{color:var(--gold)}
.overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.ov-inner{padding:0 0 48px;min-height:100%}
.ov-header{padding:18px 14px 16px;background:linear-gradient(180deg,#060810 0%,rgba(6,8,16,0) 100%);position:sticky;top:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ov-role{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:3px}
.ov-name{font-size:22px;font-weight:900;letter-spacing:-.02em;line-height:1.1}
.ov-badges{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.badge-apl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(224,48,48,.18);color:#f09090;border:1px solid rgba(224,48,48,.3)}
.badge-apl.enemy{background:rgba(58,184,160,.15);color:var(--teal2);border-color:rgba(58,184,160,.3)}
.badge-w{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.badge-sv{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.close-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:50%;width:36px;height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;-webkit-user-select:none}
.ov-body{padding:0 14px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-label.enemy{color:var(--teal)}.sec-label.neutral{color:var(--muted)}
.sec-label::after{content:"";flex:1;height:1px;background:var(--border)}
.wpn-table{width:100%;border-collapse:collapse}
.wpn-table th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:4px 4px;border-bottom:1px solid var(--border)}
.wpn-table td{font-size:12px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;color:var(--text)}
.wpn-table td:nth-child(2){font-weight:700}
.wpn-table td.num{text-align:center;font-weight:700}
.wpn-wr{font-size:10px;color:var(--muted)}
.wpn-table tr:last-child td{border-bottom:none}
.wpn-row.dimmed td{opacity:.25}
.wpn-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--surf);cursor:pointer;display:block;transition:all .15s}
.wpn-check.on{background:var(--accent);border-color:var(--accent)}
.abilities{display:flex;flex-direction:column;gap:7px}
.ability{background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:8px 10px}
.ability-name{font-size:11px;font-weight:800;color:var(--text);margin-bottom:3px}
.ability-desc{font-size:11px;line-height:1.5;color:var(--muted)}
.ability.unique{border-color:#2a3a22}.ability.unique .ability-name{color:#8fcf70}
.rules-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.rules-item-header{display:flex;align-items:center;padding:10px 12px;cursor:pointer;-webkit-user-select:none;gap:8px}
.rules-item-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.rules-item-name.strat{color:var(--blue)}.rules-item-name.fight{color:var(--orange)}
.rules-item-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.rules-item.open .rules-item-chevron{transform:rotate(90deg)}
.rules-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.rules-item.open .rules-item-body{display:block}
.tp-dots{display:flex;gap:4px;flex-shrink:0}
.tp-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-user-select:none}
.tp-dot.used-strat{background:var(--blue);border-color:var(--blue);color:#fff}
.tp-dot.used-fight{background:var(--orange);border-color:var(--orange);color:#0b0e15}
.eq-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.eq-item-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;-webkit-user-select:none}
.eq-num{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:transparent;transition:all .15s;flex-shrink:0}
.eq-item.taken .eq-num{color:#fff}
.eq-item.taken.mine-eq .eq-num{background:var(--accent);border-color:var(--accent)}
.eq-item.taken.enemy-eq .eq-num{background:var(--teal);border-color:var(--teal)}
.eq-item-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.eq-item-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.eq-item.open .eq-item-chevron{transform:rotate(90deg)}
.eq-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.eq-item.open .eq-item-body{display:block}
.desc-list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:4px}
.desc-list li{padding-left:16px;position:relative;font-size:11px;line-height:1.5}
.desc-list li::before{position:absolute;left:0;font-size:10px;top:1px}
.desc-list li.desc-green::before{content:"●";color:#5aab6a}
.desc-list li.desc-red::before{content:"●";color:#e05c5c}
.desc-text{font-size:11px;line-height:1.5;color:var(--muted)}</style>
</head>
<body>
<header>
  <div class="header-top"><h1>Kill Team - Field Viewer</h1></div>
  <div class="tabs">
    <div class="tab active-mine" id="tab-mine" onclick="switchTab('mine')"><div class="dot"></div> My Team</div>
    <div class="tab" id="tab-enemy" onclick="switchTab('enemy')"><div class="dot"></div> Opponent</div>
  </div>
</header>
<div class="panel active" id="panel-mine">
  <div class="panel-toolbar">
    <div class="dropdown-wrap">
      <select class="faction-select" id="mine-select" onchange="switchMineFaction(this.value)">
        <option value="murderwing" selected>Murderwing</option>
        <option value="raveners">Raveners</option>
        <option value="xv26">XV26 Stealth</option>
        <option value="hearthkyn">Hearthkyn Salvager</option>
        <option value="goremonger">Goremonger</option>
      </select>
      <span class="dropdown-arrow">&#9660;</span>
    </div>
    <button class="toolbar-btn mine" onclick="openRules('mine')">Rules</button>
    <button class="toolbar-btn mine" onclick="openEq('mine')">EQ</button>
  </div>
  <div id="mine-grids"></div>
</div>
<div class="panel" id="panel-enemy">
  <div class="panel-toolbar">
    <div class="dropdown-wrap">
      <select class="faction-select" id="enemy-select" onchange="switchEnemyFaction(this.value)">
        <option value="murderwing">Murderwing</option>
        <option value="raveners" selected>Raveners</option>
        <option value="xv26">XV26 Stealth</option>
        <option value="hearthkyn">Hearthkyn Salvager</option>
        <option value="goremonger">Goremonger</option>
      </select>
      <span class="dropdown-arrow">&#9660;</span>
    </div>
    <button class="toolbar-btn" onclick="openRules('enemy')">Rules</button>
    <button class="toolbar-btn" onclick="openEq('enemy')">EQ</button>
  </div>
  <div id="enemy-grids"></div>
</div>
<div class="overlay" id="overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="ov-role"></div><div class="ov-name" id="ov-name"></div><div class="ov-badges" id="ov-badges"></div></div>
      <div class="close-btn">&#x2715;</div>
    </div>
    <div class="ov-body" id="ov-body"></div>
  </div>
</div>
<div class="overlay" id="rules-overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="ro-sub"></div><div class="ov-name" id="ro-name"></div></div>
      <div class="close-btn">&#x2715;</div>
    </div>
    <div class="ov-body" id="ro-body"></div>
  </div>
</div>
<div class="overlay" id="eq-overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="eq-sub"></div><div class="ov-name" id="eq-name"></div></div>
      <div class="close-btn">&#x2715;</div>
    </div>
    <div class="ov-body" id="eq-body"></div>
  </div>
</div>
<script>

const MINE = [
  {
    id:"chaos-lord", side:"mine", role:"Leader",
    name:"Chaos Lord", shortName:'Chaos Lord',
    apl:3, move:"6\"", save:"3+", wounds:15,
    weapons:[
      {name:"Bolt pistol",           atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Plasma pistol (std)",   atk:4,hit:"3+",dmg:"3/5", wr:"Range 8\", Piercing 1"},
      {name:"Plasma pistol (sup)",   atk:4,hit:"3+",dmg:"4/5", wr:"Range 8\", Hot, Lethal 5+, Piercing 1"},
      {name:"Lightning claw",        atk:5,hit:"3+",dmg:"4/5", wr:"Lethal 5+, Rending"},
      {name:"Power fist",            atk:4,hit:"3+",dmg:"5/7", wr:"Brutal, Shock"},
      {name:"Power weapon",          atk:5,hit:"3+",dmg:"4/6", wr:"Lethal 5+"},
      {name:"Relic lightning claws", atk:5,hit:"3+",dmg:"4/6", wr:"Ceaseless, Lethal 5+, Rending"},
    ],
    abilities:[
      {name:"Path to Damnation", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">This operative starts the battle with 1 Damnation point.</li><li class=\"desc-green\">Once per action, you can attempt to use one Boon of Damnation when it specifies. Roll one D6 and compare to Damnation points: <b>Higher</b> = resolve the rule, then gain 1 Damnation point. <b>Equal</b> = do not resolve. <b>Less</b> = inflict damage equal to Damnation points.</li><li class=\"desc-green\">If this operative has 6 Damnation points, resolve the rule without rolling.</li><li class=\"desc-red\">Cannot make an attempt more than once per action, regardless of D6 result.</li></ul>"},
      {name:"Boons of Damnation", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">When an attack dice inflicts damage of 3 or more on this operative, you can ignore an amount of damage equal to its Damnation points.</li><li class=\"desc-green\">When this operative is fighting or retaliating and you strike with an attack dice, you can inflict additional damage equal to its Damnation points.</li></ul>"}
    ]
  },
  {
    id:"champion", side:"mine", role:"Champion",
    name:"Champion", shortName:'Champion',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol",         atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Plasma pistol (std)", atk:4,hit:"3+",dmg:"3/5", wr:"Range 8\", Piercing 1"},
      {name:"Plasma pistol (sup)", atk:4,hit:"3+",dmg:"4/5", wr:"Range 8\", Hot, Lethal 5+, Piercing 1"},
      {name:"Power fist",          atk:4,hit:"3+",dmg:"5/7", wr:"Brutal, Shock"},
      {name:"Power weapon",        atk:5,hit:"3+",dmg:"4/6", wr:"Lethal 5+"},
    ],
    abilities:[
      {name:"Chaos Champion", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT. Remove your Challenge token from the enemy operative that has it (if any), then select one enemy operative to gain your Challenge token.</li><li class=\"desc-green\">Whenever this operative is fighting or retaliating against an enemy operative that has your Challenge token, in the Select Weapons step you can select one of the following weapon rules for its melee weapons: Balanced, Brutal, Punishing, Severe, Shock.</li></ul>"},
      {name:"Path to Glory", desc:"<span class=\"desc-text\">Whenever this operative incapacitates an enemy operative that has your Challenge token, you gain 1CP.</span>"}
    ]
  },
  {
    id:"curseclaw", side:"mine", role:"Operative",
    name:"Curseclaw", shortName:'Curseclaw',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol",    atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Mutated claws",  atk:5,hit:"3+",dmg:"4/5", wr:"Rending"},
    ],
    abilities:[
      {name:"Frenzied Attack", desc:"<span class=\"desc-text\">If this operative is incapacitated during the Fight action, you can strike the enemy operative in that sequence with one of your unresolved successes before this operative is removed from the killzone.</span>"},
      {name:"SNATCH (1AP)", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">BOOST action. Select one enemy operative within this operative's BOOST ZONE. Both players roll one D6 and add their operative's Wounds stat. If your result is higher, remove that enemy operative from the killzone and set it back up within this operative's BOOST ZONE or control range.</li><li class=\"desc-green\">If that enemy operative is set up within control range, the Fall Back or Reposition action ends.</li><li class=\"desc-red\">Cannot perform this action normally \u2014 only during Fall Back or Reposition after setting up from a BOOST.</li></ul>", unique: true}
    ]
  },
  {
    id:"depredator", side:"mine", role:"Operative",
    name:"Depredator", shortName:'Depredator',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol",   atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Great chainaxe",atk:5,hit:"4+",dmg:"5/7", wr:"Brutal"},
    ],
    abilities:[
      {name:"Horrifying Dismemberment", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative incapacitates an enemy operative while fighting or retaliating, select one other enemy operative visible to and within 3\" of either this operative or the incapacitated enemy operative.</li><li class=\"desc-green\">Subtract 1 from that enemy operative's APL stat until the end of its next activation.</li></ul>"},
      {name:"CARVING BLOW (1AP)", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Inflict 2D3 damage on each other operative visible to and within 2\" of this operative (roll separately for each).</li><li class=\"desc-red\">Cannot perform while it has a Conceal order.</li><li class=\"desc-red\">Cannot perform during the same activation in which it performed Slice From Above, Clawed Charge or two Fight actions.</li></ul>", unique: true}
    ]
  },
  {
    id:"huntmaster", side:"mine", role:"Operative",
    name:"Huntmaster", shortName:'Huntmaster',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol", atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Power weapon", atk:5,hit:"3+",dmg:"4/6", wr:"Lethal 5+"},
    ],
    abilities:[
      {name:"Pinned Prey", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an enemy operative would perform the Fall Back action while within control range of this operative, if no other enemy operatives are within this operative's control range, you can use this rule.</li><li class=\"desc-green\">Roll two D6 (or one D6 if that enemy operative has a higher Wounds stat). If any result is a 4+, that enemy operative cannot perform that action during that activation/counteraction.</li></ul>"},
      {name:"STRIKE FROM ABOVE (1AP)", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">BOOST action. Inflict 2D3+1 damage on one enemy operative within this operative's BOOST ZONE.</li><li class=\"desc-red\">Cannot perform this action normally \u2014 only during Fall Back or Reposition after setting up from a BOOST.</li></ul>", unique: true}
    ]
  },
  {
    id:"raptor", side:"mine", role:"Operative",
    name:"Raptor", shortName:'Raptor',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol",         atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Plasma pistol (std)", atk:4,hit:"3+",dmg:"3/5", wr:"Range 8\", Piercing 1"},
      {name:"Plasma pistol (sup)", atk:4,hit:"3+",dmg:"4/5", wr:"Range 8\", Hot, Lethal 5+, Piercing 1"},
      {name:"Chainsword",          atk:5,hit:"3+",dmg:"4/5", wr:"—"},
    ],
    abilities:[
      {name:"Thrill of Flight", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative does a BOOST during its activation: you can remove any changes to its APL stat.</li><li class=\"desc-green\">You can ignore any changes to its stats from being injured (including its weapons' stats) until the end of the activation.</li></ul>"}
    ]
  },
  {
    id:"shrieker", side:"mine", role:"Operative",
    name:"Shrieker", shortName:'Shrieker',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol", atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},

    fight: [
      {name:"Slithering Evasion", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use during a friendly RAVENER operative's activation or counteraction, before or after it performs an action.</li><li class=\"desc-green\">During that activation/counteraction, that operative can: perform the Fall Back action for 1 less AP.</li><li class=\"desc-green\">Perform the Charge action while within control range of an enemy operative, and can leave that operative's control range to do so.</li></ul>"},
      {name:"Subterranean Horror", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an enemy operative is performing the Fight action and selects a friendly RAVENER operative on your TUNNEL to fight against.</li><li class=\"desc-green\">In the Resolve Attack Dice step of that sequence, you resolve the first attack dice (i.e. you act as defender instead of attacker).</li></ul>"},
      {name:"Burrowing Strike", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly RAVENER operative performs the Burrow action. Before it is removed from the killzone, or after setting it up on your TUNNEL, inflict D3+1 damage on each enemy operative within its control range (roll separately for each).</li><li class=\"desc-red\">Cannot use in the Strategy phase.</li><li class=\"desc-red\">Cannot use during a FELLTALON operative's activation/counteraction if it performs the Toxic Lunge action (and vice versa).</li></ul>"},
      {name:"Death Frenzy", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly RAVENER operative is incapacitated. Before it is removed, inflict D3 damage on each enemy operative within its control range (roll separately for each).</li><li class=\"desc-green\">If that operative is a VENOMSPITTER currently benefitting from Distend Dorsal Sac, inflict 2D3 damage instead.</li></ul>"}
    ]
  },
  "xv26": {
    name: "XV26 Stealth Battlesuits",
    subtitle: "T'au Empire",
    color: "var(--teal)",
    rules: [
      {name:"Kauyon", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting an enemy operative, its ranged weapons have the Accurate X weapon rule. X is determined by the enemy operative's location:</li><li class=\"desc-green\"><table style=\"width:100%;border-collapse:collapse;margin-top:4px;font-size:11px\"><tr><th style=\"text-align:left;color:var(--muted);padding:2px 4px;border-bottom:1px solid var(--border)\">Enemy Location</th><th style=\"text-align:center;color:var(--muted);padding:2px 4px;border-bottom:1px solid var(--border)\">Accurate X</th></tr><tr><td style=\"padding:3px 4px;color:var(--text)\">Within 3\" of your territory</td><td style=\"text-align:center;padding:3px 4px;color:var(--teal2)\">Accurate 1</td></tr><tr><td style=\"padding:3px 4px;color:var(--text)\">Within your territory</td><td style=\"text-align:center;padding:3px 4px;color:var(--teal2)\">Accurate 2</td></tr><tr><td style=\"padding:3px 4px;color:var(--text)\">Within 3\" of your drop zone</td><td style=\"text-align:center;padding:3px 4px;color:var(--teal2)\">Accurate 3</td></tr></table></li></ul>"},
      {name:"Stealth Fields", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative has a Conceal order, it cannot be visible to enemy operatives more than 3\" from it (takes precedence over all other rules).</li><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative has a Conceal order, it can perform the Fall Back action for 1 less AP.</li></ul>"}
    ],
    strat: [
      {name:"Patient Hunters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting against or fighting against an expended enemy operative, that friendly operative's weapons have the Balanced weapon rule and its ranged weapons have the Saturate weapon rule.</li></ul>"},
      {name:"Prepare Ambush", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Place one of your Ambush markers wholly within your territory and more than 2\" from enemy operatives.</li><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting an enemy operative within 2\" of that marker, you can remove the marker and that operative's ranged weapons have the Seek weapon rule until the end of the action.</li><li class=\"desc-red\">In the Ready step of the next Strategy phase, if that marker is still in the killzone, remove it.</li></ul>"},
      {name:"Bonds of Unity", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE) is activated, if visible to and within 6\" of another friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE), you can ignore changes to its APL stat and select one:</li><li class=\"desc-green\">Ignore changes to that operative's Move stat from being injured until the end of that activation.</li><li class=\"desc-green\">Ignore changes to the Hit stat of that operative's weapons from being injured until the end of that activation.</li></ul>"},
      {name:"Holowave Countermeasures", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly XV26 STEALTH BATTLESUIT operative more than 6\" away, in the Roll Attack Dice step, the attacker must discard one of their unresolved normal successes (or one critical success if there are none).</li><li class=\"desc-red\">Not cumulative with being obscured.</li></ul>"}
    ],
    fight: [
      {name:"Vectored Retro-Thrusters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an enemy operative ends the Charge action within control range of a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE). Interrupt to use this rule.</li><li class=\"desc-green\">That friendly operative can immediately perform a free Fall Back action, but cannot move more than 3\". Then that enemy operative can immediately perform a free Reposition action for any remaining move distance.</li></ul>"},
      {name:"Engage Jet Pack", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE) is activated or counteracts.</li><li class=\"desc-green\">Until the end of that activation/counteraction, you can ignore the vertical distance during one climb and one drop.</li></ul>"},
      {name:"Ghostshroud", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use at the end of a friendly XV26 STEALTH BATTLESUIT operative's activation. If it has an Engage order, change it to Conceal.</li><li class=\"desc-red\">Cannot use this ploy for each friendly operative more than once per battle.</li></ul>"},
      {name:"Saviour Protocols", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE) is selected as valid target of a Shoot action. Select one friendly DRONE operative visible to and within 3\" to become the valid target instead.</li><li class=\"desc-red\">That DRONE is only in cover or obscured if the original target was.</li><li class=\"desc-red\">No effect if the ranged weapon has the Blast or Torrent weapon rule.</li></ul>"}
    ]
  },
  "hearthkyn": {
    name: "Hearthkyn Salvager",
    subtitle: "Leagues of Votann",
    color: "var(--teal)",
    rules: [
      {name:"Grudge", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an enemy operative incapacitates a friendly HEARTHKYN SALVAGER operative, that enemy operative gains one of your Grudge tokens for the battle.</li><li class=\"desc-green\">Whenever a friendly HEARTHKYN SALVAGER operative is shooting against, fighting against or retaliating against an enemy operative, for each Grudge token that enemy operative has, you can retain one normal success as a critical success instead (including any via Accurate).</li><li class=\"desc-red\">Grudge tokens are not removed when you do this.</li></ul>"}
    ],
    strat: [
      {name:"Need Keeps", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one objective marker or one of your mission markers.</li><li class=\"desc-green\">Whenever determining control of that marker, treat the total APL stat of friendly HEARTHKYN SALVAGER operatives that contest it as 1 higher if at least one friendly operative contests it.</li><li class=\"desc-green\">Whenever a friendly HEARTHKYN SALVAGER operative is within 3\" of that marker, add 1 to the Atk stat of its melee weapons (maximum 4); if already 4, it has the Balanced weapon rule.</li><li class=\"desc-red\">Note: not a change to APL stat, so cumulative with other changes.</li></ul>"},
      {name:"Wrought Defence", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly HEARTHKYN SALVAGER operative, if you rolled one or fewer successes (including any re-rolls), you can retain one of your fails as a normal success instead of discarding it.</li></ul>"},
      {name:"Toil Earns", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one objective marker or one of your mission markers. Whenever an enemy operative is within 3\" of that marker, treat it as having one additional Grudge token.</li></ul>"},
      {name:"Proximate Firepower", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly HEARTHKYN SALVAGER operative is shooting an enemy operative within 6\", improve the Hit stat of that operative's ranged weapons by 1 (maximum 3+).</li><li class=\"desc-red\">This can apply or remove the Hit stat change during an action (takes precedence over core rules).</li></ul>"}
    ],
    fight: [
      {name:"The Ancestors Are Watching", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use during a friendly HEARTHKYN SALVAGER operative's activation. Until the end of that activation, that operative can perform either a free Shoot or a free Fight action.</li></ul>"},
      {name:"Sturdy", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an operative is shooting a friendly HEARTHKYN SALVAGER operative, when you collect your defence dice.</li><li class=\"desc-green\">Change the attacker's retained critical successes to normal successes.</li><li class=\"desc-red\">Any weapon rules already resolved (e.g. Piercing Crits) are not affected.</li></ul>"},
      {name:"Worth It", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly HEARTHKYN SALVAGER operative is incapacitated. It can perform a free mission action before it is removed from the killzone.</li></ul>"},
      {name:"Engage to Acquire", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use after rolling your attack dice for a friendly HEARTHKYN SALVAGER operative, if it is shooting against or fighting against an enemy operative that controls an objective marker or one of your mission markers.</li><li class=\"desc-green\">You can re-roll any of your attack dice.</li></ul>"}
    ]
  },
  "goremonger": {
    name: "Goremonger",
    subtitle: "World Eaters \u2014 Chaos",
    color: "var(--teal)",
    rules: [
      {name:"Runes of Khorne", desc:"<span class=\"desc-text\">Each friendly GOREMONGER operative cannot lose more than 8 wounds per Shoot action.</span>"},
      {name:"Gore Tanks", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Each friendly GOREMONGER operative has a GORE TANK with three levels: full, half and empty. They start the battle at half.</li><li class=\"desc-green\">Whenever a GOREMONGER operative incapacitates an operative within its control range, or visible to and within 2\", you can increase its GORE TANK.</li><li class=\"desc-red\">Whenever a GOREMONGER operative uses a SANGUAVITAE rule, you must decrease its GORE TANK.</li><li class=\"desc-red\">A GORE TANK cannot increase when full, or decrease when empty.</li></ul>"},
      {name:"Sanguavitae \u2014 Rejuvenate", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: During activation or counteraction, before or after performing an action.</li><li class=\"desc-green\">EFFECT: That operative regains up to D3+1 lost wounds.</li></ul>"},
      {name:"Sanguavitae \u2014 Mania", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: During activation, before or after performing an action.</li><li class=\"desc-green\">EFFECT: Until the start of that operative's next activation, add 1 to its APL stat.</li><li class=\"desc-red\">Cannot use Mania and Fury during the same activation.</li></ul>"},
      {name:"Sanguavitae \u2014 Fury", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: During activation, before or after performing an action.</li><li class=\"desc-green\">EFFECT: That operative can perform two Fight actions during that activation, and the second one is free.</li><li class=\"desc-red\">Cannot use Fury and Mania during the same activation.</li></ul>"},
      {name:"Sanguavitae \u2014 Rake", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: When performing the Charge action during activation.</li><li class=\"desc-green\">EFFECT: When that operative finishes moving during that action, you can inflict D3 damage on one enemy operative within its control range.</li></ul>"},
      {name:"Sanguavitae \u2014 Surge", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: When performing the Charge or Reposition action.</li><li class=\"desc-green\">EFFECT: Until the end of that action, add 1\" to that operative's Move stat.</li></ul>"},
      {name:"Sanguavitae \u2014 Rage", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: When performing the Fight action.</li><li class=\"desc-green\">EFFECT: Until the end of that action, add 1 to the Atk stat of that operative's melee weapons.</li></ul>"}
    ],
    strat: [
      {name:"Enhanced Violence", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly GOREMONGER operative's GORE TANK is Half: its melee weapons have the Balanced weapon rule.</li><li class=\"desc-green\">Whenever a friendly GOREMONGER operative's GORE TANK is Full: its melee weapons have the Relentless weapon rule.</li></ul>"},
      {name:"Augmented Endurance", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly GOREMONGER operative, if that operative's GORE TANK is Half: you can re-roll one of your defence dice.</li><li class=\"desc-green\">If that operative's GORE TANK is Full: you can re-roll any of your defence dice.</li></ul>"},
      {name:"Gory Tenacity", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly GOREMONGER operative is fighting or retaliating, the first time your opponent strikes it during that sequence, halve the damage inflicted (rounding up, minimum 2).</li></ul>"},
      {name:"Hunt for Blood", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one friendly GOREMONGER operative. If it has a Conceal order, change it to Engage. Then it can immediately perform a free Charge action, but cannot move more than 3\" during that action.</li></ul>"}
    ],
    fight: [
      {name:"Unbridled Aggression", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly GOREMONGER operative is fighting during an activation in which it performed the Charge action, at the end of the Roll Attack Dice step.</li><li class=\"desc-green\">Until the end of that sequence, that operative's melee weapons have the Severe weapon rule.</li></ul>"},
      {name:"Gorethirst", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when you would counteract. You can do so with one friendly GOREMONGER operative that has a Conceal order.</li><li class=\"desc-red\">Before it counteracts, you must change its order to Engage and it cannot perform any actions other than Charge, Shoot or Fight during that counteraction.</li></ul>"},
      {name:"Destructive Demise", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly GOREMONGER operative is incapacitated, before it is removed. Inflict damage on one enemy operative within control range based on GORE TANK:</li><li class=\"desc-green\">Empty GORE TANK: D3 damage.</li><li class=\"desc-green\">Half GORE TANK: D3+1 damage.</li><li class=\"desc-green\">Full GORE TANK: D3+2 damage.</li></ul>"},
      {name:"Lacerate Flesh", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly GOREMONGER operative with an empty GORE TANK is activated or counteracts. Increase its GORE TANK.</li><li class=\"desc-green\">At the end of that activation/counteraction, decrease its GORE TANK.</li><li class=\"desc-red\">You cannot use this decrease to use a SANGUAVITAE rule.</li><li class=\"desc-red\">If you cannot decrease its GORE TANK (already empty), inflict D3 damage on it.</li></ul>"}
    ]
  }
};;
const FACTION_EQ = {
  "murderwing": [
    {id:"mw-bladefins", name:"Bladefins", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly MURDERWING operatives can perform: SLICE FROM ABOVE (1AP, BOOST action) \u2014 Inflict D3+1 damage on one enemy operative within this operative's BOOST ZONE.</li><li class=\"desc-red\">Cannot perform this action normally \u2014 only during Fall Back or Reposition after setting up from a BOOST.</li></ul>"},
    {id:"mw-clawed", name:"Clawed Armour", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly MURDERWING operatives can perform: CLAWED CHARGE (0AP, BOOST action) \u2014 Inflict 1 damage on one enemy operative within control range, then the Charge action ends.</li><li class=\"desc-red\">Cannot perform this action normally \u2014 only during the Charge action after setting up from a BOOST.</li></ul>"},
    {id:"mw-warpfuel", name:"Warp Fuel", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when an enemy operative ends the Fall Back action during its activation, if at least one friendly MURDERWING operative was within its control range at the start of that action: one of those friendly operatives can immediately perform a free Reposition or Charge action, but cannot use more than 3\" of move distance.</li><li class=\"desc-red\">Note: if the enemy operative does not perform Fall Back during its own activation, this has no effect.</li></ul>"},
    {id:"mw-voxcasters", name:"Vox-Casters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly MURDERWING operatives can perform: VOX-CRY (1AP) \u2014 Each enemy operative within 3\" takes a stun test (roll D6: on a 3+, subtract 1 from its APL stat until the end of its next activation).</li><li class=\"desc-red\">Cannot perform this action while this operative has a Conceal order.</li></ul>"}
  ],
  "raveners": [
    {id:"rv-chromato", name:"Chromatospore Camouflage", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly RAVENER operative, if you can retain any cover saves, you can retain one additional cover save.</li><li class=\"desc-red\">Not cumulative with improved cover saves from Vantage terrain.</li></ul>"},
    {id:"rv-acidblood", name:"Acid Blood", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly RAVENER operative is fighting or retaliating, whenever an attack dice inflicts damage on it, roll one D6: on a 5+, inflict 1 damage on the enemy operative in that sequence.</li></ul>"},
    {id:"rv-metamorphic", name:"Metamorphic Flesh", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly RAVENER operative is activated, it regains up to D3 lost wounds.</li></ul>"},
    {id:"rv-heightened", name:"Heightened Senses", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle, after rolling off to decide initiative, if a friendly RAVENER operative is underground and an enemy operative is within 5\" of your TUNNEL, you can re-roll your dice.</li></ul>"}
  ],
  "xv26": [
    {id:"xv-multitrackers", name:"XV26 Multitrackers", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly XV26 STEALTH BATTLESUIT operative is performing the Shoot action and selects a burst cannon (sweeping), until the end of that action that weapon has the Torrent 2\" weapon rule.</li></ul>"},
    {id:"xv-blacksun", name:"Advanced Blacksun Filters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting an operative that is obscured, you do not have to discard one success as a result of that rule.</li><li class=\"desc-red\">All other effects of obscured apply as normal.</li></ul>"},
    {id:"xv-jammers", name:"Counter-Network Jammers", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT. Select one objective marker or mission marker. Until the end of the turning point, whenever determining control of that marker, treat the total APL stat of enemy operatives that contest it as 1 lower if at least one contesting enemy operative is within 3\" of a friendly XV26 STEALTH BATTLESUIT operative.</li><li class=\"desc-red\">Note: not a change to APL stat, so changes are cumulative with this.</li></ul>"},
    {id:"xv-targetlocks", name:"Hardwired Target Locks", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever you would counteract, you can do so with one friendly XV26 STEALTH BATTLESUIT operative that has a Conceal order and is more than 3\" from enemy operatives.</li><li class=\"desc-red\">Before it counteracts, you must change its order to Engage and it cannot perform any actions other than Shoot during that counteraction.</li></ul>"}
  ],
  "hearthkyn": [
    {id:"hk-plasmaknives", name:"Plasma Knives", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly HEARTHKYN SALVAGER operatives gain the following melee weapon \u2014 Plasma Knives: ATK 3, HIT 4+, DMG 3/5, Lethal 5+.</li><li class=\"desc-red\">The FIELD MEDIC already has this weapon with better stats \u2014 use the better version in that case.</li></ul>"},
    {id:"hk-excavation", name:"Excavation Tools", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly HEARTHKYN SALVAGER operatives can perform the Pick Up Marker action for 1 less AP.</li><li class=\"desc-green\">They do not have to control the marker to pick it up \u2014 they only need to contest it (takes precedence over that action's conditions).</li></ul>"},
    {id:"hk-climbing", name:"Climbing Rigs", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">During each friendly HEARTHKYN SALVAGER operative's activation, you can do one of the following:</li><li class=\"desc-green\">When that operative is climbing up, treat the vertical distance as 2\" regardless of actual distance.</li><li class=\"desc-green\">When that operative is dropping, ignore the vertical distance.</li></ul>"},
    {id:"hk-writ", name:"Writ of Claim", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle, if friendly HEARTHKYN SALVAGER operatives contest two or more objective markers, after rolling off to decide initiative, you can re-roll your dice.</li></ul>"}
  ],
  "goremonger": [
    {id:"gm-gorytotem", name:"Gory Totem", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Before the battle, set up one Gory Totem marker wholly within your territory and more than 2\" from other markers (excluding Bloody Cadaver marker).</li><li class=\"desc-green\">Whenever an enemy operative within 3\" of your Gory Totem marker is shooting, fighting or retaliating, your opponent cannot re-roll their attack dice.</li></ul>"},
    {id:"gm-cadaver", name:"Bloody Cadaver", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Before the battle, set up one Bloody Cadaver marker wholly within your territory and more than 2\" from other markers (excluding Gory Totem marker).</li><li class=\"desc-green\">Friendly GOREMONGER operatives can perform the Pick Up Marker action on it.</li><li class=\"desc-green\">In the Ready step of each Strategy phase, you can increase the GORE TANK of one friendly GOREMONGER operative that controls that marker.</li><li class=\"desc-red\">Cannot increase GORE TANK if that operative is within control range of an enemy operative.</li></ul>"},
    {id:"gm-chaossigil", name:"Chaos Sigil", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when an operative is shooting a friendly GOREMONGER operative, at the start of the Roll Defence Dice step you can use this rule. If you do, worsen the x of the Piercing weapon rule by 1 (if any) until the end of that sequence.</li><li class=\"desc-red\">Note: Piercing 1 would therefore be ignored.</li></ul>"},
    {id:"gm-wristchains", name:"Wrist Chains", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly GOREMONGER operative performs the Shoot action and you are selecting a ranged weapon, until the end of that action the following melee weapons are treated as ranged weapons with Range 2\": chainblade, chainglaive, great chainaxe (ignore its Brutal weapon rule), pickrippers.</li></ul>"}
  ]
};;
var UNIVERSAL_EQ = [{"id": "ue-ammo", "name": "1x Ammo Cache", "desc": "Before the battle, set up one Ammo Cache marker in your territory. AMMO RESUPPLY (0AP mission action): one Ammo Cache marker you control is used this turning point — until the start of the next turning point, when shooting, you can re-roll one attack dice. Cannot use while in control range of an enemy operative or if the marker has been used this turning point."}, {"id": "ue-razor", "name": "1x Razor Wire", "desc": "Exposed and Obstructing terrain. Set up wholly within your territory before the battle. Obstructing: whenever an operative would cross over this terrain feature within 1\" of it, treat the distance as an additional 1\"."}, {"id": "ue-comms", "name": "1x Comms Device", "desc": "Before the battle, set up one Comms Device marker in your territory. While a friendly operative controls this marker, add 3\" to the distance requirements of its SUPPORT rules that refer to friendly operatives."}, {"id": "ue-mines", "name": "1x Mines", "desc": "Before the battle, set up one Mines marker in your territory, more than 2\" from other markers, access points and Accessible terrain. The first time that marker is within an operative's control range, remove it and inflict D3+3 damage on that operative."}, {"id": "ue-lbarricade", "name": "2x Light Barricades", "desc": "Light terrain (feet are Insignificant and Exposed). Set up wholly within your territory before the battle."}, {"id": "ue-hbarricade", "name": "1x Heavy Barricade", "desc": "Heavy terrain. Set up wholly within 4\" of your drop zone before the battle."}, {"id": "ue-ladders", "name": "2x Ladders", "desc": "Insignificant and Exposed terrain. Set up within your territory, upright against terrain at least 2\" tall, more than 2\" from other equipment terrain features and more than 1\" from doors and access points. Once per action, when an operative is climbing the terrain a ladder is placed against, treat the vertical distance as 1\" if the ladder is within control range during the entire climb."}, {"id": "ue-portable", "name": "1x Portable Barricade", "desc": "Light, Protective and Portable terrain (feet Insignificant/Exposed). Protective: while in cover from this feature, improve Save stat by 1 (max 2+). Portable: only provides cover while an operative is connected and the shield is intervening. MOVE WITH BARRICADE (1AP): like Reposition but max Move -2\", cannot climb/drop/jump. Cannot use while in control range of enemy or during same activation as Fall Back or Charge."}, {"id": "ue-utility", "name": "Utility Grenades", "desc": "Select two utility grenades (2 smoke, 2 stun, or 1+1). SMOKE GRENADE (1AP): place a Smoke Grenade marker within 6\" visible to this operative — creates smoke 1\" horizontally; operatives wholly within are Obscured to those more than 2\" away; Piercing 2 becomes Piercing 1 within smoke unless within 2\". Removed after D3 activations or end of TP. STUN GRENADE (1AP): select visible enemy within 6\" — it and each operative within 1\" take a stun test (D6, on 3+ subtract 1 APL until end of next activation)."}, {"id": "ue-explosive", "name": "Explosive Grenades", "desc": "Select two explosive grenades (2 frag, 2 krak, or 1+1). Frag grenade: ATK 4, HIT 4+, DMG 2/4, Range 6\", Blast 2\", Saturate. Krak grenade: ATK 4, HIT 4+, DMG 4/5, Range 6\", Piercing 1, Saturate. Each usable a number of times equal to your selection."}, {"id": "ue-breach", "name": "Breaching Charge", "desc": "Once per battle, when a friendly operative performs the Breach action, it can perform it for 1 less AP (minimum 1AP) as though it had the word \"breach marker\" on its datacard."}];

FACTION_RULES['murderwing'] = FACTION_RULES['mine'];
FACTION_EQ['mine'] = FACTION_EQ['murderwing'];

var ALL = {murderwing:MINE, raveners:RAVENERS, xv26:XV26, hearthkyn:HEARTHKYN, goremonger:GOREMONGER};
var activeTab='mine', mineFac='murderwing', enemyFac='raveners';
var selected={}, selCnt=0, eqTaken={}, eqOrd={}, eqCnt=0, ployTP={}, wpnOn={};

/* ── EVENT DELEGATION ── */
document.addEventListener('click', function(e) {
  var t = e.target;

  // Number badge on unit card
  if (t.classList.contains('card-num')) {
    e.stopPropagation();
    var uid = t.id.replace('n-', '');
    var u = findUnit(uid);
    if (u) toggleSel(u, uid);
    return;
  }
  // Close overlays on backdrop only
  if (t.classList.contains('overlay')) {
    t.classList.remove('open');
    return;
  }
  // Close unit overlay on tap anywhere inside ov-inner EXCEPT wpn-table and controls
  var inOvInner = t.closest('#overlay .ov-inner');
  if (inOvInner && !t.closest('.wpn-table') && !t.closest('.close-btn') && !t.closest('.card-num') && !t.closest('.wpn-check')) {
    document.getElementById('overlay').classList.remove('open');
    return;
  }
  // Close buttons
  if (t.classList.contains('close-btn')) {
    var ov = t.closest('.overlay');
    if (ov) ov.classList.remove('open');
    return;
  }
  // Stop propagation inside overlay content
  if (t.closest('.ov-inner')) {
    // handled below specifically
  }
  // TP dot — must check BEFORE rules-item-header since dots live inside it
  var tpEl2 = t.closest('.tp-dot');
  if (tpEl2) {
    e.stopPropagation();
    var uid2 = tpEl2.getAttribute('data-uid');
    var tp2 = parseInt(tpEl2.getAttribute('data-tp'));
    var type2 = tpEl2.getAttribute('data-type');
    if (!ployTP[uid2]) ployTP[uid2] = {};
    if (ployTP[uid2][tp2]) { delete ployTP[uid2][tp2]; tpEl2.className = 'tp-dot'; }
    else { ployTP[uid2][tp2] = true; tpEl2.className = 'tp-dot used-' + type2; }
    return;
  }
  // Accordion toggle (rules-item-header, eq-item-header)
  var rh = t.closest('.rules-item-header');
  if (rh) {
    e.stopPropagation();
    var item = rh.closest('.rules-item');
    if (item) item.classList.toggle('open');
    return;
  }
  var eh = t.closest('.eq-item-header');
  if (eh) {
    e.stopPropagation();
    // If click was on eq-num, handle EQ toggle
    if (t.classList.contains('eq-num') || t.closest('.eq-num')) {
      var numEl = t.classList.contains('eq-num') ? t : t.closest('.eq-num');
      var eqEl = numEl.closest('.eq-item');
      if (eqEl) togEq(eqEl.id);
      return;
    }
    var eqItem = eh.closest('.eq-item');
    if (eqItem) eqItem.classList.toggle('open');
    return;
  }

  // Weapon checkbox
  if (t.classList.contains('wpn-check')) {
    e.stopPropagation();
    var uid3 = t.getAttribute('data-uid');
    var idx = parseInt(t.getAttribute('data-i'));
    wpnOn[uid3][idx] = !wpnOn[uid3][idx];
    var row = document.getElementById('wr-' + uid3 + '-' + idx);
    if (wpnOn[uid3][idx]) { if(row) row.classList.remove('dimmed'); t.classList.add('on'); }
    else { if(row) row.classList.add('dimmed'); t.classList.remove('on'); }
    return;
  }
  // Unit card
  var card = t.closest('.card');
  if (card && !t.closest('.card-num')) {
    var cuid = card.id.replace('c-', '');
    var cu = findUnit(cuid);
    if (cu) openUnit(cu);
    return;
  }
});

/* Toolbar buttons use simple onclick strings that don't need ID params — keep those */

function findUnit(uid) {
  var parts = uid.split('-');
  var side = parts[0];
  var id = parts.slice(1).join('-');
  var fac = side === 'mine' ? mineFac : enemyFac;
  var units = ALL[fac] || [];
  for (var i = 0; i < units.length; i++) {
    if (units[i].id === id) return Object.assign({}, units[i], {side: side});
  }
  // Search all factions if not found in current
  var allKeys = Object.keys(ALL);
  for (var fi = 0; fi < allKeys.length; fi++) {
    var fu = ALL[allKeys[fi]] || [];
    for (var ui = 0; ui < fu.length; ui++) {
      if (fu[ui].id === id) return Object.assign({}, fu[ui], {side: side});
    }
  }
  return null;
}

function showGrid(side, fac) {
  var cont = document.getElementById(side==='mine'?'mine-grids':'enemy-grids');
  [].forEach.call(cont.children, function(c){ c.style.display='none'; });
  var ex = document.getElementById('g-'+side+'-'+fac);
  if (ex) { ex.style.display=''; return; }
  var g = document.createElement('div');
  g.className = 'grid'; g.id = 'g-'+side+'-'+fac;
  (ALL[fac]||[]).forEach(function(u){ g.appendChild(mkCard(Object.assign({},u,{side:side}))); });
  cont.appendChild(g);
}

function mkCard(u) {
  var uid = u.side+'-'+u.id;
  var d = document.createElement('div');
  d.className = 'card '+u.side; d.id = 'c-'+uid;
  var sr = '';
  ['APL','MOV','SV','W'].forEach(function(k,i){
    sr += '<div class="sm"><span>'+k+'</span><span>'+[u.apl,u.move,u.save,u.wounds][i]+'</span></div>';
  });
  d.innerHTML =
    '<div class="card-num" id="n-'+uid+'"></div>'+
    '<div class="card-role">'+u.role+'</div>'+
    '<div class="card-name'+(u.name.length>15?' long':'')+'">'+u.name+'</div>'+
    '<div class="stat-row">'+sr+'</div>'+
    '<div class="card-pills"><span class="pill w">W '+u.wounds+'</span><span class="pill sv">Sv '+u.save+'</span></div>';
  return d;
}

function toggleSel(u, uid) {
  var c = document.getElementById('c-'+uid);
  if (selected[uid] !== undefined) {
    var n = selected[uid]; delete selected[uid]; selCnt--;
    Object.keys(selected).forEach(function(id){ if(selected[id]>n){ selected[id]--; updN(id); } });
    if(c) c.classList.remove('selected'); updN(uid);
  } else {
    selCnt++; selected[uid] = selCnt;
    if(c) c.classList.add('selected'); updN(uid);
  }
  reord(u.side);
}
function updN(uid) { var e=document.getElementById('n-'+uid); if(e) e.textContent=selected[uid]!==undefined?selected[uid]:''; }
function reord(side) {
  var fac = side==='mine'?mineFac:enemyFac;
  var g = document.getElementById('g-'+side+'-'+fac); if(!g) return;
  var cs = Array.from(g.children);
  var sel = cs.filter(function(c){ return c.classList.contains('selected'); })
              .sort(function(a,b){ return (selected[a.id.replace('c-','')]||999)-(selected[b.id.replace('c-','')]||999); });
  var un = cs.filter(function(c){ return !c.classList.contains('selected'); });
  sel.concat(un).forEach(function(c){ g.appendChild(c); });
}

function formatDesc(text) {
  if (!text) return text;

  // Patterns that suggest a list structure:
  // 1. Text containing ": " followed by multiple clauses separated by "; "
  // 2. Text with "WHEN:" / "EFFECT:" labels
  // 3. Single long text — just return as-is with no bullets

  var restrictWords = /^(Cannot|cannot|Only|only|If you cannot|Not when|not when|Do not|does not|This operative cannot|Note:|Exception|Limit)/;

  // Split on newlines first, then on "; " if result has 2+ parts
  var parts = [];

  // Check for WHEN/EFFECT pattern
  if (/WHEN\s*:/.test(text) || /EFFECT\s*:/.test(text)) {
    parts = text.split(/(?=WHEN|EFFECT)/);
  }
  // Check for numbered/lettered list like (A) (B) or 1. 2.
  else if (/\([A-D]\)/.test(text)) {
    parts = text.split(/(?=\([A-D]\))/);
  }
  // Check for sentences separated by ". " where each is substantial
  else {
    var sents = text.split(/\.\s+(?=[A-Z])/);
    if (sents.length >= 3) {
      parts = sents.map(function(s, i) { return i < sents.length-1 ? s+'.' : s; });
    }
  }

  if (parts.length < 2) return '<span class="desc-text">' + text + '</span>';

  var html = '<ul class="desc-list">';
  parts.forEach(function(p) {
    p = p.trim();
    if (!p) return;
    var isRed = restrictWords.test(p) || /Cannot|cannot/.test(p) && !/^Whenever/.test(p);
    html += '<li class="' + (isRed ? 'desc-red' : 'desc-green') + '">' + p + '</li>';
  });
  html += '</ul>';
  return html;
}

function openUnit(u) {
  var uid = u.side+'-'+u.id;
  var ac = u.side==='enemy'?'enemy':'';
  document.getElementById('ov-role').textContent = u.role;
  document.getElementById('ov-role').style.color = u.side==='enemy'?'var(--teal)':'var(--accent)';
  document.getElementById('ov-name').textContent = u.name;
  document.getElementById('ov-badges').innerHTML =
    '<span class="badge-apl '+ac+'">APL '+u.apl+'</span>'+
    '<span class="badge-w">W '+u.wounds+'</span>'+
    '<span class="badge-sv">Sv '+u.save+' / Move '+u.move+'</span>';
  if (!wpnOn[uid]) { wpnOn[uid]={}; u.weapons.forEach(function(w,i){ wpnOn[uid][i]=true; }); }
  var h = '<div class="sec-label '+ac+'">Weapons</div><table class="wpn-table">'+
    '<tr><th></th><th>Name</th><th>ATK</th><th>HIT</th><th>DMG</th><th>Rules</th></tr>';
  u.weapons.forEach(function(w,i){
    var on = wpnOn[uid][i]!==false;
    h += '<tr class="wpn-row'+(on?'':' dimmed')+'" id="wr-'+uid+'-'+i+'">'+
      '<td><div class="wpn-check'+(on?' on':'')+'" data-uid="'+uid+'" data-i="'+i+'"></div></td>'+
      '<td>'+w.name+'</td><td class="num">'+w.atk+'</td><td class="num">'+w.hit+
      '</td><td class="num">'+w.dmg+'</td><td class="wpn-wr">'+w.wr+'</td></tr>';
  });
  h += '</table>';
  if (u.abilities && u.abilities.length) {
    h += '<div class="sec-label '+ac+'">Abilities</div><div class="abilities">';
    u.abilities.forEach(function(a){
      h += '<div class="ability'+(a.unique?' unique':'')+'"><div class="ability-name">'+a.name+'</div><div class="ability-desc">'+formatDesc(a.desc)+'</div></div>';
    });
    h += '</div>';
  }
  document.getElementById('ov-body').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); }

function secLbl(t){ return '<div class="sec-label neutral">'+t+'</div>'; }

function ruleIt(id, name, nc, desc, tpUid, tpType) {
  var dots = '';
  if (tpUid) {
    var used = ployTP[tpUid]||{};
    dots = '<div class="tp-dots">';
    for (var tp=1; tp<=4; tp++) {
      dots += '<div class="tp-dot'+(used[tp]?' used-'+tpType:'')+'" data-uid="'+tpUid+'" data-tp="'+tp+'" data-type="'+tpType+'">'+tp+'</div>';
    }
    dots += '</div>';
  }
  return '<div class="rules-item" id="'+id+'">'+
    '<div class="rules-item-header">'+
      '<span class="rules-item-name '+nc+'">'+name+'</span>'+dots+
      '<span class="rules-item-chevron">&#9658;</span>'+
    '</div><div class="rules-item-body">'+formatDesc(desc)+'</div></div>';
}

function openRules(side) {
  var fkey = side==='mine'?mineFac:enemyFac;
  var d = FACTION_RULES[fkey]; if(!d) return;
  document.getElementById('ro-sub').textContent = d.subtitle||'';
  document.getElementById('ro-sub').style.color = d.color||'var(--muted)';
  document.getElementById('ro-name').textContent = d.name;
  var h = '';
  if(d.rules&&d.rules.length){ h+=secLbl('Faction Rules'); d.rules.forEach(function(r,i){ h+=ruleIt('rr'+i,r.name,'',r.desc,'',''); }); }
  if(d.strat&&d.strat.length){ h+=secLbl('Strategy Ploys'); d.strat.forEach(function(r,i){ h+=ruleIt('rs'+i,r.name,'strat',r.desc,'sp-'+fkey+'-'+i,'strat'); }); }
  if(d.fight&&d.fight.length){ h+=secLbl('Firefight Ploys'); d.fight.forEach(function(r,i){ h+=ruleIt('rf'+i,r.name,'fight',r.desc,'fp-'+fkey+'-'+i,'fight'); }); }
  document.getElementById('ro-body').innerHTML = h;
  document.getElementById('rules-overlay').classList.add('open');
  document.getElementById('rules-overlay').scrollTop = 0;
}
function closeRules(){ document.getElementById('rules-overlay').classList.remove('open'); }

function eqIt(uid, name, desc, cls) {
  var taken = !!eqTaken[uid], num = eqOrd[uid]!==undefined?eqOrd[uid]:'';
  return '<div class="eq-item'+(taken?' taken':'')+' '+cls+'" id="'+uid+'">'+
    '<div class="eq-item-header">'+
      '<div class="eq-num">'+num+'</div>'+
      '<span class="eq-item-name">'+name+'</span>'+
      '<span class="eq-item-chevron">&#9658;</span>'+
    '</div><div class="eq-item-body">'+formatDesc(desc)+'</div></div>';
}

function openEq(side) {
  var fkey = side==='mine'?mineFac:enemyFac;
  var d = FACTION_EQ[fkey], r = FACTION_RULES[fkey]; if(!d) return;
  document.getElementById('eq-sub').textContent = r?r.subtitle:'';
  document.getElementById('eq-sub').style.color = r?r.color:'var(--muted)';
  document.getElementById('eq-name').textContent = (r?r.name:fkey)+' - Equipment';
  var cls = side==='mine'?'mine-eq':'enemy-eq';
  var h = '';
  d.forEach(function(eq){ h+=eqIt('eq-'+fkey+'-'+eq.id,eq.name,eq.desc,cls); });
  h += secLbl('Universal Equipment');
  UNIVERSAL_EQ.forEach(function(eq){ h+=eqIt('ue-'+eq.id,eq.name,eq.desc,cls); });
  document.getElementById('eq-body').innerHTML = h;
  Object.keys(eqOrd).forEach(function(uid){ updEq(uid); });
  reordEq();
  document.getElementById('eq-overlay').classList.add('open');
  document.getElementById('eq-overlay').scrollTop = 0;
}
function togEq(uid) {
  var el = document.getElementById(uid); if(!el) return;
  if (eqTaken[uid]) {
    var n = eqOrd[uid]; delete eqTaken[uid]; delete eqOrd[uid]; eqCnt--;
    Object.keys(eqOrd).forEach(function(id){ if(eqOrd[id]>n){ eqOrd[id]--; updEq(id); } });
    el.classList.remove('taken'); updEq(uid);
  } else {
    eqCnt++; eqTaken[uid]=true; eqOrd[uid]=eqCnt;
    el.classList.add('taken'); updEq(uid);
  }
  reordEq();
}
function updEq(uid) {
  var el = document.getElementById(uid); if(!el) return;
  var b = el.querySelector('.eq-num'); if(b) b.textContent = eqOrd[uid]!==undefined?eqOrd[uid]:'';
}
function reordEq() {
  var b = document.getElementById('eq-body'); if(!b) return;
  var items = Array.from(b.querySelectorAll('.eq-item'));
  var tk = items.filter(function(e){ return e.classList.contains('taken'); })
                .sort(function(a,b){ return (eqOrd[a.id]||999)-(eqOrd[b.id]||999); });
  var un = items.filter(function(e){ return !e.classList.contains('taken'); });
  tk.concat(un).forEach(function(e){ b.appendChild(e); });
}
function closeEq(){ document.getElementById('eq-overlay').classList.remove('open'); }

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('panel-mine').classList.toggle('active', tab==='mine');
  document.getElementById('panel-enemy').classList.toggle('active', tab==='enemy');
  document.getElementById('tab-mine').className = 'tab'+(tab==='mine'?' active-mine':'');
  document.getElementById('tab-enemy').className = 'tab'+(tab==='enemy'?' active-enemy':'');
}
function switchMineFaction(f){ mineFac=f; showGrid('mine',f); }
function switchEnemyFaction(f){ enemyFac=f; showGrid('enemy',f); }

showGrid('mine','murderwing');
showGrid('enemy','raveners');

</script>
