<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kill Team">
<meta name="theme-color" content="#0b0e15">
<title>Kill Team - Viewer</title>
<style>:root{--bg:#0b0e15;--surf:#131720;--card:#181e2c;--border:#252d40;--accent:#e03030;--accent2:#ff6b35;--teal:#3ab8a0;--teal2:#5dd4be;--text:#e8eaf0;--muted:#7a8199;--gold:#d4a843;--blue:#6ab0ff;--orange:#ffb07a;--overlay:rgba(6,8,14,0.97);--tab-h:88px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:80px}
header{background:linear-gradient(180deg,#07090f 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:14px 14px 0;position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-top h1{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex}
.tab{flex:1;height:52px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;-webkit-user-select:none}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .15s}
.tab.active-mine{color:var(--accent);border-color:var(--accent)}.tab.active-mine .dot{background:var(--accent)}
.tab.active-enemy{color:var(--teal);border-color:var(--teal)}.tab.active-enemy .dot{background:var(--teal)}
.panel{display:none}.panel.active{display:block}
.panel-toolbar{display:flex;align-items:center;gap:7px;padding:10px 10px 6px;position:sticky;top:var(--tab-h);z-index:15;background:var(--bg);border-bottom:1px solid var(--border)}
.dropdown-wrap{position:relative;flex:1;min-width:0}
.faction-select{width:100%;background:var(--surf);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:8px 28px 8px 10px;border-radius:9px;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none}
.dropdown-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none}
.toolbar-btn{background:var(--surf);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 10px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;-webkit-user-select:none;display:flex;align-items:center;gap:4px;flex-shrink:0}
.toolbar-btn:active{border-color:var(--teal);color:var(--teal)}.toolbar-btn.mine:active{border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:6px 10px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 12px 10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,transform .1s;-webkit-user-select:none}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .15s}
.card.mine::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.card.enemy::before{background:linear-gradient(90deg,var(--teal),var(--teal2))}
.card:active{transform:scale(0.97)}
.card.mine.selected{border-color:var(--accent);background:rgba(224,48,48,.08)}.card.mine.selected::before{opacity:1}
.card.enemy.selected{border-color:var(--teal);background:rgba(58,184,160,.08)}.card.enemy.selected::before{opacity:1}
.card-num{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent;transition:all .15s;z-index:2;cursor:pointer}
.card.mine.selected .card-num{background:var(--accent);border-color:var(--accent);color:#fff}
.card.enemy.selected .card-num{background:var(--teal);border-color:var(--teal);color:#fff}
.card-role{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.card-name{font-size:15px;font-weight:800;line-height:1.15;letter-spacing:-.01em;color:var(--text);padding-right:34px}
.card-name.long{font-size:12px}
.stat-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.sm{font-size:10px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:22px}
.sm span:first-child{font-size:8px;font-weight:700;letter-spacing:.05em;color:var(--accent)}
.card.enemy .sm span:first-child{color:var(--teal)}
.sm span:last-child{font-size:13px;font-weight:800;color:var(--text)}
.card-pills{display:flex;gap:6px;margin-top:8px}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--surf);color:var(--muted)}
.pill.w{color:#e07070}.pill.sv{color:var(--gold)}
.overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.ov-inner{padding:0 0 48px;min-height:100%}
.ov-header{padding:18px 14px 16px;background:linear-gradient(180deg,#060810 0%,rgba(6,8,16,0) 100%);position:sticky;top:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ov-role{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:3px}
.ov-name{font-size:22px;font-weight:900;letter-spacing:-.02em;line-height:1.1}
.ov-badges{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.badge-apl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(224,48,48,.18);color:#f09090;border:1px solid rgba(224,48,48,.3)}
.badge-apl.enemy{background:rgba(58,184,160,.15);color:var(--teal2);border-color:rgba(58,184,160,.3)}
.badge-w{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.badge-sv{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.close-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:50%;width:36px;height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;-webkit-user-select:none}
.ov-body{padding:0 14px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-label.enemy{color:var(--teal)}.sec-label.neutral{color:var(--muted)}
.sec-label::after{content:"";flex:1;height:1px;background:var(--border)}
.wpn-table{width:100%;border-collapse:collapse}
.wpn-table th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:4px 4px;border-bottom:1px solid var(--border)}
.wpn-table td{font-size:12px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;color:var(--text)}
.wpn-table td:nth-child(2){font-weight:700}
.wpn-table td.num{text-align:center;font-weight:700}
.wpn-wr{font-size:10px;color:var(--muted)}
.wpn-table tr:last-child td{border-bottom:none}
.wpn-row.dimmed td{opacity:.25}
.wpn-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--surf);cursor:pointer;display:block;transition:all .15s}
.wpn-check.on{background:var(--accent);border-color:var(--accent)}
.abilities{display:flex;flex-direction:column;gap:7px}
.ability{background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:8px 10px}
.ability-name{font-size:11px;font-weight:800;color:var(--text);margin-bottom:3px}
.ability-desc{font-size:11px;line-height:1.5;color:var(--muted)}
.ability.unique{border-color:#2a3a22}.ability.unique .ability-name{color:#8fcf70}
.rules-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.rules-item-header{display:flex;align-items:center;padding:10px 12px;cursor:pointer;-webkit-user-select:none;gap:8px}
.rules-item-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.rules-item-name.strat{color:var(--blue)}.rules-item-name.fight{color:var(--orange)}
.rules-item-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.rules-item.open .rules-item-chevron{transform:rotate(90deg)}
.rules-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.rules-item.open .rules-item-body{display:block}
.tp-dots{display:flex;gap:4px;flex-shrink:0}
.tp-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-user-select:none}
.tp-dot.used-strat{background:var(--blue);border-color:var(--blue);color:#fff}
.tp-dot.used-fight{background:var(--orange);border-color:var(--orange);color:#0b0e15}
.eq-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.eq-item-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;-webkit-user-select:none}
.eq-num{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:transparent;transition:all .15s;flex-shrink:0}
.eq-item.taken .eq-num{color:#fff}
.eq-item.taken.mine-eq .eq-num{background:var(--accent);border-color:var(--accent)}
.eq-item.taken.enemy-eq .eq-num{background:var(--teal);border-color:var(--teal)}
.eq-item-name{font-size:12px;font-weight:800;color:var(--text);flex:1}
.eq-item-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.eq-item.open .eq-item-chevron{transform:rotate(90deg)}
.eq-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.eq-item.open .eq-item-body{display:block}
.faq-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--surf);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0;-webkit-user-select:none;transition:all .15s}
.faq-badge:active{background:var(--gold);border-color:var(--gold);color:#000}
.faq-item{background:var(--surf);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden}
.faq-item-header{display:flex;align-items:flex-start;padding:10px 12px;cursor:pointer;-webkit-user-select:none;gap:8px}
.faq-q{font-size:11px;font-weight:700;color:var(--gold);flex:1;line-height:1.4}
.faq-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-top:1px}
.faq-item.open .faq-chevron{transform:rotate(90deg)}
.faq-item-body{display:none;padding:8px 12px 10px;font-size:11px;line-height:1.6;color:var(--muted);border-top:1px solid var(--border)}
.faq-item.open .faq-item-body{display:block}
.faq-a{color:var(--teal2);font-weight:600}
.inline-action{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:7px;padding:7px 10px;margin:5px 0;font-size:11px}
.card.enemy .inline-action,.inline-action.enemy{border-left-color:var(--teal)}
.inline-action-header{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.inline-action-icon{font-size:11px;color:var(--accent)}
.card.enemy .inline-action-icon{color:var(--teal)}
.inline-action-name{font-weight:800;color:var(--text);font-size:12px;letter-spacing:.03em}
.inline-action-ap{background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px;letter-spacing:.05em}
.inline-action.enemy .inline-action-ap{background:var(--teal)}
.inline-action-desc{color:var(--muted);line-height:1.5;margin:0}
.inline-wpn{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px;margin:5px 0;display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:11px}
.inline-wpn-name{font-weight:800;color:var(--text);flex-shrink:0}
.inline-wpn-stats{display:flex;gap:5px;flex-wrap:wrap}
.inline-wpn-stat{display:flex;flex-direction:column;align-items:center;min-width:28px}
.inline-wpn-stat span:first-child{font-size:8px;font-weight:700;color:var(--accent);letter-spacing:.06em}
.inline-wpn-stat span:last-child{font-size:12px;font-weight:800;color:var(--text)}
.inline-wpn-wr{font-size:10px;color:var(--muted);flex-basis:100%}
.desc-list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:4px}
.desc-list li{padding-left:16px;position:relative;font-size:11px;line-height:1.5}
.desc-list li::before{position:absolute;left:0;font-size:10px;top:1px}
.desc-list li.desc-green::before{content:"●";color:#5aab6a}
.desc-list li.desc-red::before{content:"●";color:#e05c5c}
.desc-text{font-size:11px;line-height:1.5;color:var(--muted)}</style>
</head>
<body>
<header>
  <div class="header-top"><h1>Kill Team - Field Viewer</h1></div>
  <div class="tabs">
    <div class="tab active-mine" id="tab-mine" onclick="switchTab('mine')"><div class="dot"></div> My Team</div>
    <div class="tab" id="tab-enemy" onclick="switchTab('enemy')"><div class="dot"></div> Opponent</div>
  </div>
</header>
<div class="panel active" id="panel-mine">
  <div class="panel-toolbar">
    <div class="dropdown-wrap">
      <select class="faction-select" id="mine-select" onchange="switchMineFaction(this.value)">
        <option value="murderwing" selected>Murderwing</option>
        <option value="raveners">Raveners</option>
        <option value="xv26">XV26 Stealth</option>
        <option value="hearthkyn">Hearthkyn Salvager</option>
        <option value="goremonger">Goremonger</option>
        <option value="deathwatch">Deathwatch</option>
        <option value="wolf-scouts">Wolf Scouts</option>
        <option value="canoptek">Canoptek Circle</option>
        <option value="hernkyn">Hernkyn Yaegir</option>
        <option value="vespid">Vespid Stingwings</option>
      </select>
      <span class="dropdown-arrow">&#9660;</span>
    </div>
    <button class="toolbar-btn mine" onclick="openRules('mine')">Rules</button>
    <button class="toolbar-btn mine" onclick="openEq('mine')">EQ</button>
  </div>
  <div id="mine-grids"></div>
</div>
<div class="panel" id="panel-enemy">
  <div class="panel-toolbar">
    <div class="dropdown-wrap">
      <select class="faction-select" id="enemy-select" onchange="switchEnemyFaction(this.value)">
        <option value="murderwing">Murderwing</option>
        <option value="raveners" selected>Raveners</option>
        <option value="xv26">XV26 Stealth</option>
        <option value="hearthkyn">Hearthkyn Salvager</option>
        <option value="goremonger">Goremonger</option>
        <option value="deathwatch">Deathwatch</option>
        <option value="wolf-scouts">Wolf Scouts</option>
        <option value="canoptek">Canoptek Circle</option>
        <option value="hernkyn">Hernkyn Yaegir</option>
        <option value="vespid">Vespid Stingwings</option>
      </select>
      <span class="dropdown-arrow">&#9660;</span>
    </div>
    <button class="toolbar-btn" onclick="openRules('enemy')">Rules</button>
    <button class="toolbar-btn" onclick="openEq('enemy')">EQ</button>
  </div>
  <div id="enemy-grids"></div>
</div>
<div class="overlay" id="overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="ov-role"></div><div class="ov-name" id="ov-name"></div><div class="ov-badges" id="ov-badges"></div></div>
      <div class="close-btn">&#x2715;</div>
    </div>
    <div class="ov-body" id="ov-body"></div>
  </div>
</div>
<div class="overlay" id="rules-overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div style="flex:1"><div style="display:flex;align-items:center;gap:8px"><div class="ov-name" id="ro-name"></div><div class="faq-badge" id="faq-badge" onclick="toggleFaq()">?</div></div><div class="ov-role" id="ro-sub"></div></div>
      <div class="close-btn">&#x2715;</div>
    </div>
    <div class="ov-body"><div id="rules-content" id="ro-body-wrap"><div id="ro-body"></div></div><div id="faq-section" style="padding:0 14px;display:none"></div></div>
  </div>
</div>
<div class="overlay" id="eq-overlay">
  <div class="ov-inner">
    <div class="ov-header">
      <div><div class="ov-role" id="eq-sub"></div><div class="ov-name" id="eq-name"></div></div>
      <div class="close-btn">&#x2715;</div>
    </div>
    <div class="ov-body" id="eq-body"></div>
  </div>
</div>
<script>

const MINE = [
  {
    id:"chaos-lord", side:"mine", role:"Leader",
    name:"Chaos Lord", shortName:'Chaos Lord',
    apl:3, move:"6\"", save:"3+", wounds:15,
    weapons:[
      {name:"Bolt pistol",           atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Plasma pistol (standard)",   atk:4,hit:"3+",dmg:"3/5", wr:"Range 8\", Piercing 1"},
      {name:"Plasma pistol (supercharged)",   atk:4,hit:"3+",dmg:"4/5", wr:"Range 8\", Hot, Lethal 5+, Piercing 1"},
      {name:"Lightning claw",        atk:5,hit:"3+",dmg:"4/5", wr:"Lethal 5+, Rending"},
      {name:"Power fist",            atk:4,hit:"3+",dmg:"5/7", wr:"Brutal, Shock"},
      {name:"Power weapon",          atk:5,hit:"3+",dmg:"4/6", wr:"Lethal 5+"},
      {name:"Relic lightning claws", atk:5,hit:"3+",dmg:"4/6", wr:"Ceaseless, Lethal 5+, Rending"},
    ],
    abilities:[
      {name:"Path to Damnation", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">This operative starts the battle with 1 Damnation point.</li></ul><ul class=\"desc-list\"><li class=\"desc-green\">Once per action, you can attempt to use one Boon of Damnation when it specifies. Roll one D6 and compare to the number of Damnation points:</li></ul><div style=\"padding:4px 0 4px 16px;font-size:11px;color:var(--muted);line-height:1.7\"><b>Higher</b> = resolve the rule, then gain 1 Damnation point.<br><b>Equal</b> = do not resolve the rule.<br><b>Less</b> = Inflict damage on this operative equal to its number of Damnation points and do not resolve the rule.</div><ul class=\"desc-list\"><li class=\"desc-green\">If this operative has 6 Damnation points, resolve the rule without rolling.</li><li class=\"desc-red\">Cannot make an attempt more than once per action, regardless of D6 result.</li></ul>"},
      {name:"Boons of Damnation", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">When an attack dice inflicts damage of 3 or more on this operative, you can ignore an amount of damage equal to its Damnation points.</li><li class=\"desc-green\">When this operative is fighting or retaliating and you strike with an attack dice, you can inflict additional damage equal to its Damnation points.</li></ul>"}
    ]
  },
  {
    id:"champion", side:"mine", role:"Champion",
    name:"Champion", shortName:'Champion',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol",         atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Plasma pistol (standard)", atk:4,hit:"3+",dmg:"3/5", wr:"Range 8\", Piercing 1"},
      {name:"Plasma pistol (supercharged)", atk:4,hit:"3+",dmg:"4/5", wr:"Range 8\", Hot, Lethal 5+, Piercing 1"},
      {name:"Power fist",          atk:4,hit:"3+",dmg:"5/7", wr:"Brutal, Shock"},
      {name:"Power weapon",        atk:5,hit:"3+",dmg:"4/6", wr:"Lethal 5+"},
    ],
    abilities:[
      {name:"Chaos Champion", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT. Remove your Challenge token from the enemy operative that has it (if any), then select one enemy operative to gain your Challenge token.</li><li class=\"desc-green\">Whenever this operative is fighting or retaliating against an enemy operative that has your Challenge token, in the Select Weapons step you can select one of the following weapon rules for its melee weapons: Balanced, Brutal, Punishing, Severe, Shock.</li></ul>"},
      {name:"Path to Glory", desc:"<span class=\"desc-text\">Whenever this operative incapacitates an enemy operative that has your Challenge token, you gain 1CP.</span>"}
    ]
  },
  {
    id:"curseclaw", side:"mine", role:"Operative",
    name:"Curseclaw", shortName:'Curseclaw',
    apl:3, move:"6\"", save:"3+", wounds:14,
    weapons:[
      {name:"Bolt pistol",    atk:4,hit:"3+",dmg:"3/4", wr:"Range 8\""},
      {name:"Mutated claws",  atk:5,hit:"3+",dmg:"4/5", wr:"Rending"},

    abilities:[{"name": "*Drag", "desc": "<span class=\"desc-text\">Whenever this operative is shooting with this weapon, at the start of the Resolve Attack Dice step (before inflicting damage), you can move the target up to X\". X is your total number of successful unblocked attack dice, multiplied by 2. The target must be moved to a location it can be placed as close as possible to this operative, determined by the X\" you choose to use. The move must be done in one or more straight-line increments, and increments are always rounded up to the nearest inch. Whenever the target is dropping during that move, ignore the vertical distance.</span>"}, {"name": "*Prey", "desc": "<span class=\"desc-text\">Whenever this operative is shooting with this weapon, in the Resolve Attack Dice step, after resolving the Drag weapon rule (if you choose to), you can discard any of your successful unblocked attack dice. In other words, you can choose not to inflict damage with any number of them.</span>"}]
  },
  {
    id:"gm-inciter", side:"enemy", faction:'goremonger', role:"Operative",
    name:"Goremonger Inciter", shortName:'Inciter',
    apl:2, move:"7\"", save:"5+", wounds:10,
    weapons:[{"name": "Dual autopistols (focused)", "atk": "4", "hit": "3+", "dmg": "2/2", "wr": "Range 8\", Ceaseless, Devastating 1, Rending"}, {"name": "Dual autopistols (point-blank)", "atk": "4", "hit": "3+", "dmg": "3/4", "wr": "Ceaseless, Rending"}],
    abilities:[{"name": "DASH AND SPRAY", "desc": "<div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">DASH AND SPRAY</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Perform a free Dash action and a free Shoot action with this operative in any order. You can only select dual autopistols (focused) for that Shoot action.</p></div><ul class=\"desc-list\"><li class=\"desc-red\">This operative cannot perform this action while it has a Conceal order, or while within control range of an enemy operative.</li></ul>", "unique": true}, {"name": "Incite the Hunt", "desc": "<ul class=\"desc-list\"><li class=\"desc-green\">Whenever this operative incapacitates an enemy operative from more than 2\" away, before that enemy operative is removed, you can increase the GORE TANK of one friendly GOREMONGER operative within 8\" of that enemy operative.</li><li class=\"desc-green\">Whenever this operative inflicts damage on an enemy operative with either profile of its dual autopistols but doesn't incapacitate it, that enemy operative gains one of your Bleeding tokens (if it doesn't already have one).</li><li class=\"desc-green\">During a friendly GOREMONGER operative's activation or counteraction, before or after it performs an action, if it's within 8\" of an enemy operative that has one of your Bleeding tokens, you can remove that token and increase that friendly operative's GORE TANK.</li></ul>"}]
  },
  {

    abilities:[{"name": "Brutish", "desc": "<span class=\"desc-text\">Whenever an attack dice would inflict Critical Dmg on this operative, you can choose for that attack dice to inflict Normal Dmg instead.</span>"}, {"name": "Claim Skull", "desc": "<span class=\"desc-text\">Once per turning point, if this operative incapacitates an enemy operative with its great chainaxe, you gain 1CP.</span>"}]

    abilities:[{"name": "Rooftop Stalker", "desc": "<span class=\"desc-text\">Whenever this operative is fighting during an activation in which it dropped from Vantage terrain, or whenever this operative is fighting against an enemy operative that's on Vantage terrain, this operative's melee weapons have the Relentless weapon rule.</span>"}, {"name": "Climbing Picks", "desc": "<span class=\"desc-text\">Whenever this operative is climbing, treat the vertical distance as 2\" regardless of how far it actually moves vertically.</span>"}]

const FACTION_RULES = {
  "mine": {
    name: "Murderwing",
    subtitle: "Chaos Space Marines",
    color: "var(--accent)",
    rules: [
      {name:"Jump Pack", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly MURDERWING operative is performing the Charge, Fall Back or Reposition action, at the start of any straight-line increment, as long as no part of its base is underneath Vantage terrain, it can do a BOOST for that increment.</li><li class=\"desc-green\">Remove it from the killzone and set it back up wholly within X\" horizontally (X added to total move distance; move plus BOOST cannot exceed the action's move allowance).</li><li class=\"desc-red\">If BOOSTing during the Charge action, do not add the additional 2\" to its move allowance.</li><li class=\"desc-red\">Must be set up in a valid location, cannot be set up underneath Vantage terrain, and (unless Charging) cannot be set up within control range of an enemy operative.</li><li class=\"desc-red\">In a killzone that uses the close quarters rules, the X\" cannot be measured over or through Wall terrain, and that operative cannot be set up on the other side of an access point \u2014 it cannot BOOST through an open hatchway.</li></ul>"},
      {name:"Boost Actions", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">BOOST actions are performed during other actions when a BOOST is used. Each operative cannot perform more than one BOOST action per activation/counteraction.</li><li class=\"desc-green\">Most BOOST actions affect enemy operatives within a friendly MURDERWING operative's BOOST ZONE: the horizontal area between the operative's current location and the location from which it used BOOST.</li><li class=\"desc-red\">Enemy operatives with any part of their base underneath Vantage terrain are not within friendly MURDERWING operatives' BOOST ZONEs.</li></ul>"},
      {name:"Astartes", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">During each friendly MURDERWING operative's activation, it can perform either two Shoot actions or two Fight actions. If two Shoot actions, a bolt pistol must be selected for at least one.</li><li class=\"desc-green\">Each friendly MURDERWING operative can counteract regardless of its order.</li></ul>"}
    ],
    strat: [
      {name:"Predators Above", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly MURDERWING operative is at least 2\" higher than the killzone floor, its weapons have the Balanced weapon rule.</li><li class=\"desc-green\">Whenever a friendly MURDERWING operative does a BOOST, its weapons have the Balanced weapon rule until the end of that activation.</li></ul>"},
      {name:"Cull the Weak", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly MURDERWING operative is shooting or fighting, its weapons have the Punishing weapon rule if any of the following are true for the target:</li><li class=\"desc-green\">It is at least 2\" lower than that friendly operative.</li><li class=\"desc-green\">Its APL stat is less than normal.</li><li class=\"desc-green\">It was wounded at the start of the activation/counteraction.</li></ul>"},
      {name:"Nightmare on High", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly MURDERWING operative that is at least 2\" higher than the killzone floor, or that did a BOOST during this turning point, you can re-roll one of your defence dice.</li></ul>"},
      {name:"Instil Fear", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly MURDERWING operative is fighting, Normal Dmg of 3 or more inflicts 1 less damage on it.</li></ul>"}
    ],
    fight: [
      {name:"Malicious Narcissism", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when it is your turn to activate with a friendly operative, if only one friendly MURDERWING operative is ready.</li><li class=\"desc-green\">Until the end of the turning point, whenever you have fewer ready friendly operatives than your opponent, you can skip your activations (delay that operative until your opponent has only one ready operative).</li><li class=\"desc-red\">You cannot counteract until that friendly MURDERWING operative is expended.</li></ul>"},
      {name:"Murderous Descent", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an enemy operative ends the Charge, Dash, Fall Back or Reposition action within 3\" horizontally and more than 2\" lower than a friendly MURDERWING operative, or in close quarters within 2\" and that enemy operative must be in a different room to where it started that action.</li><li class=\"desc-green\">Interrupt and immediately perform a free Charge action with that friendly operative. It must end within control range of that enemy operative.</li><li class=\"desc-red\">If ending within control range is not possible, the interruption is cancelled and this rule has not been used.</li></ul>"},
      {name:"Long Forgotten Honour", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly MURDERWING operative is fighting or retaliating, when you resolve a critical success.</li><li class=\"desc-green\">Instead of striking or blocking, end that sequence (remaining attack dice discarded) and immediately perform a free Fall Back action up to 3\". That operative can do so even if normally prevented from performing Fall Back.</li></ul>"},
      {name:"Wings of Darkness", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly MURDERWING operative is performing Fall Back or Reposition, when it does a BOOST. That operative can be set up an additional 3\" away during that BOOST (adding this to the permitted move distance).</li><li class=\"desc-red\">It cannot perform the Shoot, Fight or Carving Blow action until the next turning point.</li><li class=\"desc-red\">Cannot use this ploy during the first turning point.</li></ul>"}
    ]
  },
  "raveners": {
    name: "Raveners",
    subtitle: "Tyranid Kill Team",
    color: "var(--teal)",
    rules: [
      {name:"Burrow", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">When setting up, your first two operatives must be set up as normal. Each other friendly RAVENER operative can be set up underground (placed to one side instead of in the killzone).</li><li class=\"desc-green\">Underground operatives can only perform Burrow. At the end of the battle, each underground operative is incapacitated.</li><li class=\"desc-green\">BURROW (1AP): If underground, set up on your TUNNEL (subtract 2\" from Move until end of activation/counteraction). If in the killzone on your TUNNEL, remove it \u2014 it is now underground.</li><li class=\"desc-red\">Cannot perform Burrow while carrying a marker.</li></ul>"},
      {name:"Tunnel", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">At the end of Set Up Operatives, place Tunnel marker \"0\" on the killzone floor, wholly within your drop zone and touching your killzone edge.</li><li class=\"desc-green\">As a STRATEGIC GAMBIT in the first four turning points, place the next numbered Tunnel marker wholly within 5\" of your preceding Tunnel marker (maximum 5 markers total).</li><li class=\"desc-green\">Your TUNNEL is created by your Tunnel markers and the area between sequentially numbered markers (0-1, 1-2, etc.).</li><li class=\"desc-green\">In a killzone that uses the close quarters rules, your TUNNEL and the distance can be measured through Wall terrain. In a killzone that uses the hazardous areas rules, for the purposes of the Restricted Movement rule, parts of a Tunnel marker that are touching a hazardous area are treated as a hazardous area.</li></ul>"},
      {name:"Predatory Instincts", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">During each friendly RAVENER operative's activation, it can perform two Fight actions.</li><li class=\"desc-green\">Each friendly RAVENER operative can counteract regardless of its order. Whenever it counteracts: you can change its order first, or change its order instead of performing an action (still treated as having counteracted).</li><li class=\"desc-green\">During that counteraction, if it does not perform a mission action it can perform a free Burrow action.</li></ul>"}
    ],
    strat: [
      {name:"Death from Below", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly RAVENER operative is fighting: if it performed the Burrow action during that activation/counteraction, its melee weapons have the Balanced weapon rule.</li><li class=\"desc-green\">If it is on your TUNNEL, its melee weapons have the Ceaseless weapon rule.</li></ul>"},
      {name:"Whipcord Emergence", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly RAVENER operative: if that friendly operative performed the Burrow action during this turning point, you can re-roll one of your defence dice.</li><li class=\"desc-green\">If that friendly operative is on your TUNNEL, you can re-roll any of your defence dice.</li></ul>"},
      {name:"Writhe Out of Sight", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one friendly RAVENER operative in the killzone. That operative can immediately perform a free Burrow action.</li><li class=\"desc-green\">If it is within 2\" of your TUNNEL, it can immediately perform a free Fall Back or Reposition action before doing so.</li></ul>"},
      {name:"Tunnel Lurkers", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly RAVENER operative is on your TUNNEL it is in cover, unless it is within 2\" of the active operative.</li><li class=\"desc-red\">Treated as cover provided by Light terrain (affected by rules that prevent this, e.g. Seek and Vantage terrain).</li></ul>"}
    ],
    fight: [
      {name:"Slithering Evasion", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use during a friendly RAVENER operative's activation or counteraction, before or after it performs an action.</li><li class=\"desc-green\">During that activation/counteraction, that operative can: perform the Fall Back action for 1 less AP.</li><li class=\"desc-green\">Perform the Charge action while within control range of an enemy operative, and can leave that operative's control range to do so.</li></ul>"},
      {name:"Subterranean Horror", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an enemy operative is performing the Fight action and selects a friendly RAVENER operative on your TUNNEL to fight against.</li><li class=\"desc-green\">In the Resolve Attack Dice step of that sequence, you resolve the first attack dice (i.e. you act as defender instead of attacker).</li></ul>"},
      {name:"Burrowing Strike", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly RAVENER operative performs the Burrow action. Before it is removed from the killzone, or after setting it up on your TUNNEL, inflict D3+1 damage on each enemy operative within its control range (roll separately for each).</li><li class=\"desc-red\">Cannot use in the Strategy phase.</li><li class=\"desc-red\">Cannot use during a FELLTALON operative's activation/counteraction if it performs the Toxic Lunge action (and vice versa).</li></ul>"},
      {name:"Death Frenzy", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly RAVENER operative is incapacitated. Before it is removed, inflict D3 damage on each enemy operative within its control range (roll separately for each).</li><li class=\"desc-green\">If that operative is a VENOMSPITTER currently benefitting from Distend Dorsal Sac, inflict 2D3 damage instead.</li></ul>"}
    ]
  },
  "xv26": {
    name: "XV26 Stealth Battlesuits",
    subtitle: "T'au Empire",
    color: "var(--teal)",
    rules: [
      {name:"Kauyon", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting an enemy operative, its ranged weapons have the Accurate X weapon rule. X is determined by the enemy operative's location:</li><li class=\"desc-green\"><table style=\"width:100%;border-collapse:collapse;margin-top:4px;font-size:11px\"><tr><th style=\"text-align:left;color:var(--muted);padding:2px 4px;border-bottom:1px solid var(--border)\">Enemy Location</th><th style=\"text-align:center;color:var(--muted);padding:2px 4px;border-bottom:1px solid var(--border)\">Accurate X</th></tr><tr><td style=\"padding:3px 4px;color:var(--text)\">Within 3\" of your territory</td><td style=\"text-align:center;padding:3px 4px;color:var(--teal2)\">Accurate 1</td></tr><tr><td style=\"padding:3px 4px;color:var(--text)\">Within your territory</td><td style=\"text-align:center;padding:3px 4px;color:var(--teal2)\">Accurate 2</td></tr><tr><td style=\"padding:3px 4px;color:var(--text)\">Within 3\" of your drop zone</td><td style=\"text-align:center;padding:3px 4px;color:var(--teal2)\">Accurate 3</td></tr></table></li></ul>"},
      {name:"Stealth Fields", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative has a Conceal order, it cannot be visible to enemy operatives more than 3\" from it (takes precedence over all other rules).</li><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative has a Conceal order, it can perform the Fall Back action for 1 less AP.</li></ul>"}
    ],
    strat: [
      {name:"Patient Hunters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting against or fighting against an expended enemy operative, that friendly operative's weapons have the Balanced weapon rule and its ranged weapons have the Saturate weapon rule.</li></ul>"},
      {name:"Prepare Ambush", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Place one of your Ambush markers wholly within your territory and more than 2\" from enemy operatives.</li><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting an enemy operative within 2\" of that marker, you can remove the marker and that operative's ranged weapons have the Seek weapon rule until the end of the action.</li><li class=\"desc-red\">In the Ready step of the next Strategy phase, if that marker is still in the killzone, remove it.</li></ul>"},
      {name:"Bonds of Unity", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE) is activated, if visible to and within 6\" of another friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE), you can ignore changes to its APL stat and select one:</li><li class=\"desc-green\">Ignore changes to that operative's Move stat from being injured until the end of that activation.</li><li class=\"desc-green\">Ignore changes to the Hit stat of that operative's weapons from being injured until the end of that activation.</li></ul>"},
      {name:"Holowave Countermeasures", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly XV26 STEALTH BATTLESUIT operative more than 6\" away, in the Roll Attack Dice step, the attacker must discard one of their unresolved normal successes (or one critical success if there are none).</li><li class=\"desc-red\">Not cumulative with being obscured.</li></ul>"}
    ],
    fight: [
      {name:"Vectored Retro-Thrusters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an enemy operative ends the Charge action within control range of a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE). Interrupt to use this rule.</li><li class=\"desc-green\">That friendly operative can immediately perform a free Fall Back action, but cannot move more than 3\". Then that enemy operative can immediately perform a free Reposition action for any remaining move distance it had from that first Charge action, and can do so even if it's performed an action that prevents it from performing the Reposition action.</li></ul>"},
      {name:"Engage Jet Pack", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE) is activated or counteracts.</li><li class=\"desc-green\">Until the end of that activation/counteraction, you can ignore the vertical distance during one climb and one drop.</li></ul>"},
      {name:"Ghostshroud", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use at the end of a friendly XV26 STEALTH BATTLESUIT operative's activation. If it has an Engage order, change it to Conceal.</li><li class=\"desc-red\">Cannot use this ploy for each friendly operative more than once per battle.</li></ul>"},
      {name:"Saviour Protocols", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly XV26 STEALTH BATTLESUIT operative (excluding DRONE) is selected as valid target of a Shoot action. Select one friendly DRONE operative visible to and within 3\" to become the valid target instead (even if it wouldn't normally be valid for this).</li><li class=\"desc-red\">That DRONE is only in cover or obscured if the original target was.</li><li class=\"desc-red\">No effect if the ranged weapon has the Blast or Torrent weapon rule.</li></ul>"}
    ]
  },
  "hearthkyn": {
    name: "Hearthkyn Salvager",
    subtitle: "Leagues of Votann",
    color: "var(--teal)",
    rules: [
      {name:"Grudge", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an enemy operative incapacitates a friendly HEARTHKYN SALVAGER operative, that enemy operative gains one of your Grudge tokens for the battle.</li><li class=\"desc-green\">Whenever a friendly HEARTHKYN SALVAGER operative is shooting against, fighting against or retaliating against an enemy operative, for each Grudge token that enemy operative has, you can retain one normal success as a critical success instead (including any via Accurate).</li><li class=\"desc-red\">Grudge tokens are not removed when you do this.</li></ul>"}
    ],
    strat: [
      {name:"Need Keeps", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one objective marker or one of your mission markers.</li><li class=\"desc-green\">Whenever determining control of that marker, treat the total APL stat of friendly HEARTHKYN SALVAGER operatives that contest it as 1 higher if at least one friendly operative contests it.</li><li class=\"desc-green\">Whenever a friendly HEARTHKYN SALVAGER operative is within 3\" of that marker, add 1 to the Atk stat of its melee weapons (maximum 4); if already 4, it has the Balanced weapon rule.</li><li class=\"desc-red\">Note: not a change to APL stat, so cumulative with other changes.</li></ul>"},
      {name:"Wrought Defence", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly HEARTHKYN SALVAGER operative, if you rolled one or fewer successes (including any re-rolls), you can retain one of your fails as a normal success instead of discarding it.</li></ul>"},
      {name:"Toil Earns", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one objective marker or one of your mission markers. Whenever an enemy operative is within 3\" of that marker, treat it as having one additional Grudge token.</li></ul>"},
      {name:"Proximate Firepower", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly HEARTHKYN SALVAGER operative is shooting an enemy operative within 6\", improve the Hit stat of that operative's ranged weapons by 1 (maximum 3+).</li><li class=\"desc-red\">This can apply or remove the Hit stat change during an action (takes precedence over core rules).</li></ul>"}
    ],
    fight: [
      {name:"The Ancestors Are Watching", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use during a friendly HEARTHKYN SALVAGER operative's activation. Until the end of that activation, that operative can perform either a free Shoot or a free Fight action.</li></ul>"},
      {name:"Sturdy", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an operative is shooting a friendly HEARTHKYN SALVAGER operative, when you collect your defence dice.</li><li class=\"desc-green\">Change the attacker's retained critical successes to normal successes.</li><li class=\"desc-red\">Any weapon rules already resolved (e.g. Piercing Crits) are not affected.</li></ul>"},
      {name:"Worth It", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly HEARTHKYN SALVAGER operative is incapacitated. It can perform a free mission action before it is removed from the killzone.</li></ul>"},
      {name:"Engage to Acquire", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use after rolling your attack dice for a friendly HEARTHKYN SALVAGER operative, if it is shooting against or fighting against an enemy operative that controls an objective marker or one of your mission markers.</li><li class=\"desc-green\">You can re-roll any of your attack dice.</li></ul>"}
    ]
  },
  "goremonger": {
    name: "Goremonger",
    subtitle: "World Eaters \u2014 Chaos",
    color: "var(--teal)",
    rules: [
      {name:"Runes of Khorne", desc:"<span class=\"desc-text\">Each friendly GOREMONGER operative cannot lose more than 8 wounds per Shoot action.</span>"},
      {name:"Gore Tanks", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Each friendly GOREMONGER operative has a GORE TANK with three levels: full, half and empty. They start the battle at half.</li><li class=\"desc-green\">Whenever a GOREMONGER operative incapacitates an operative within its control range, or visible to and within 2\", you can increase its GORE TANK.</li><li class=\"desc-red\">Whenever a GOREMONGER operative uses a SANGUAVITAE rule, you must decrease its GORE TANK.</li><li class=\"desc-red\">A GORE TANK cannot increase when full, or decrease when empty.</li></ul>"},
      {name:"Sanguavitae \u2014 Rejuvenate", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: During activation or counteraction, before or after performing an action.</li><li class=\"desc-green\">EFFECT: That operative regains up to D3+1 lost wounds.</li><li class=\"desc-red\">You cannot use the same SANGUAVITAE rule more than once per activation or counteraction, and you cannot use more than two SANGUAVITAE rules per activation or counteraction.</li></ul>"},
      {name:"Sanguavitae \u2014 Mania", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: During activation, before or after performing an action.</li><li class=\"desc-green\">EFFECT: Until the start of that operative's next activation, add 1 to its APL stat.</li><li class=\"desc-red\">Cannot use Mania and Fury during the same activation.</li><li class=\"desc-red\">You cannot use the same SANGUAVITAE rule more than once per activation or counteraction, and you cannot use more than two SANGUAVITAE rules per activation or counteraction.</li></ul>"},
      {name:"Sanguavitae \u2014 Fury", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: During activation, before or after performing an action.</li><li class=\"desc-green\">EFFECT: That operative can perform two Fight actions during that activation, and the second one is free.</li><li class=\"desc-red\">Cannot use Fury and Mania during the same activation.</li><li class=\"desc-red\">You cannot use the same SANGUAVITAE rule more than once per activation or counteraction, and you cannot use more than two SANGUAVITAE rules per activation or counteraction.</li></ul>"},
      {name:"Sanguavitae \u2014 Rake", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: When performing the Charge action during activation.</li><li class=\"desc-green\">EFFECT: When that operative finishes moving during that action, you can inflict D3 damage on one enemy operative within its control range.</li><li class=\"desc-red\">You cannot use the same SANGUAVITAE rule more than once per activation or counteraction, and you cannot use more than two SANGUAVITAE rules per activation or counteraction.</li></ul>"},
      {name:"Sanguavitae \u2014 Surge", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: When performing the Charge or Reposition action.</li><li class=\"desc-green\">EFFECT: Until the end of that action, add 1\" to that operative's Move stat.</li><li class=\"desc-red\">You cannot use the same SANGUAVITAE rule more than once per activation or counteraction, and you cannot use more than two SANGUAVITAE rules per activation or counteraction.</li></ul>"},
      {name:"Sanguavitae \u2014 Rage", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">WHEN: When performing the Fight action.</li><li class=\"desc-green\">EFFECT: Until the end of that action, add 1 to the Atk stat of that operative's melee weapons.</li><li class=\"desc-red\">You cannot use the same SANGUAVITAE rule more than once per activation or counteraction, and you cannot use more than two SANGUAVITAE rules per activation or counteraction.</li></ul>"}
    ],
    strat: [
      {name:"Enhanced Violence", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly GOREMONGER operative's GORE TANK is Half: its melee weapons have the Balanced weapon rule.</li><li class=\"desc-green\">Whenever a friendly GOREMONGER operative's GORE TANK is Full: its melee weapons have the Relentless weapon rule.</li></ul>"},
      {name:"Augmented Endurance", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly GOREMONGER operative, if that operative's GORE TANK is Half: you can re-roll one of your defence dice.</li><li class=\"desc-green\">If that operative's GORE TANK is Full: you can re-roll any of your defence dice.</li></ul>"},
      {name:"Gory Tenacity", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly GOREMONGER operative is fighting or retaliating, the first time your opponent strikes it during that sequence, halve the damage inflicted (rounding up, minimum 2).</li></ul>"},
      {name:"Hunt for Blood", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select one friendly GOREMONGER operative. If it has a Conceal order, change it to Engage. Then it can immediately perform a free Charge action, but cannot move more than 3\" during that action.</li></ul>"}
    ],
    fight: [
      {name:"Unbridled Aggression", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly GOREMONGER operative is fighting during an activation in which it performed the Charge action, at the end of the Roll Attack Dice step.</li><li class=\"desc-green\">Until the end of that sequence, that operative's melee weapons have the Severe weapon rule.</li></ul>"},
      {name:"Gorethirst", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when you would counteract. You can do so with one friendly GOREMONGER operative that has a Conceal order.</li><li class=\"desc-red\">Before it counteracts, you must change its order to Engage and it cannot perform any actions other than Charge, Shoot or Fight during that counteraction.</li></ul>"},
      {name:"Destructive Demise", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly GOREMONGER operative is incapacitated, before it is removed. Inflict damage on one enemy operative within control range based on GORE TANK:</li><li class=\"desc-green\">Empty GORE TANK: D3 damage.</li><li class=\"desc-green\">Half GORE TANK: D3+1 damage.</li><li class=\"desc-green\">Full GORE TANK: D3+2 damage.</li></ul>"},
      {name:"Lacerate Flesh", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly GOREMONGER operative with an empty GORE TANK is activated or counteracts. Increase its GORE TANK.</li><li class=\"desc-green\">At the end of that activation/counteraction, decrease its GORE TANK.</li><li class=\"desc-red\">You cannot use this decrease to use a SANGUAVITAE rule.</li><li class=\"desc-red\">If you cannot decrease its GORE TANK (already empty), inflict D3 damage on it.</li></ul>"}
    ]
  },
  "deathwatch":{name:"Deathwatch",subtitle:"Adeptus Astartes",color:"var(--teal)",rules:[{name:"Veteran Astartes",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">During each friendly DEATHWATCH operative's activation, it can perform either two Shoot actions or two Fight actions.</li><li class=\"desc-red\">If two Shoot actions, 1 additional AP must be spent for the second action if both use an auxiliary grenade launcher, frag cannon, heavy plasma incinerator, infernus heavy bolter, plasma pistol or stalker bolt rifle, or if a melta bomb is selected for either.</li><li class=\"desc-green\">Each friendly DEATHWATCH operative can counteract regardless of its order. Whenever it does, it can perform an additional 1AP action for free during that counteraction, but both actions must be different and you cannot perform a Fight and Shoot action during the same counteraction.</li></ul>"},{name:"Special Issue Ammunition",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly DEATHWATCH operative is performing the Shoot action, in the Select Weapon step, you can select one of the following weapon rules for that operative's ranged weapons to have until the end of the action: Blast 1\", Devastating 1, Lethal 5+, Piercing Crits 1, Saturate, Severe.</li><li class=\"desc-red\">Cannot be used with explosive grenades or melta bombs.</li><li class=\"desc-red\">Cannot select Blast 1\" if the weapon profile has the Torrent weapon rule.</li></ul>"}],strat:[{name:"Mission Tactics",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Select Conceal or Engage. Whenever a friendly DEATHWATCH operative is shooting against or fighting against an enemy operative that has that order, that friendly operative's weapons have the Balanced weapon rule.</li></ul>"},{name:"The Shield That Slays",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly DEATHWATCH operative is wholly within your opponent's territory, Normal Dmg of 4 or more inflicts 1 less damage on it.</li></ul>"},{name:"The Long Vigil",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly DEATHWATCH operative that is wholly within your territory, you can re-roll one of your defence dice.</li></ul>"},{name:"And They Shall Know No Fear",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">You can ignore any changes to the stats of friendly DEATHWATCH operatives from being injured (including their weapons' stats).</li></ul>"}],fight:[{name:"Suffer Not the Alien",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use after rolling your attack dice for a friendly DEATHWATCH operative, if it is shooting against or fighting against an operative that does not have the CHAOS or IMPERIUM keyword. You can re-roll any of your attack dice.</li></ul>"},{name:"Advanced Auspex Scan",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly DEATHWATCH operative performs the Shoot action. Until the end of the activation/counteraction, its ranged weapons have the Saturate weapon rule and enemy operatives cannot be obscured.</li></ul>"},{name:"Auspicator Tracking",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly DEATHWATCH operative is counteracting, before it performs any actions. You can change its order.</li></ul>"},{name:"Transhuman Physiology",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an operative is shooting a friendly DEATHWATCH operative, in the Roll Defence Dice step. You can retain one of your normal successes as a critical success instead.</li></ul>"}]},
  "wolf-scouts":{name:"Wolf Scouts",subtitle:"Space Wolves",color:"var(--teal)",rules:[{name:"Elemental Storm",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT. Remove your Storm marker from the killzone (if any), then place it in the killzone. Whenever an operative is within 6\" horizontally of your Storm marker, it is within your STORM.</li><li class=\"desc-green\">Each friendly WOLF SCOUT operative can perform the Charge action while it has a Conceal order if it ends that action within your STORM.</li></ul>"},{name:"Hunting Astartes",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">During each friendly WOLF SCOUT operative's activation, it can perform either two Shoot actions or two Fight actions.</li><li class=\"desc-red\">If two Shoot actions: 1 additional AP must be spent for the second action if both use a plasma gun or plasma pistol. You cannot select two PSYCHIC ranged weapons.</li><li class=\"desc-green\">Each friendly WOLF SCOUT operative can counteract regardless of its order. Whenever it does so within your STORM, you can change its order first, or change its order instead of performing an action (still treated as having counteracted this turning point).</li></ul>"}],strat:[{name:"Cloaked by the Storm",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly WOLF SCOUT operative that is within your STORM, you can re-roll one of your defence dice.</li></ul>"},{name:"Storm's Bite",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly WOLF SCOUT operative is fighting against an enemy operative within your STORM, subtract 1 from the Atk stat of that enemy operative's melee weapons (minimum 3).</li></ul>"},{name:"Tempestuous Wrath",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly WOLF SCOUT operative is fighting or retaliating, if it is within your STORM or was within your STORM at the start of the activation, its melee weapons have the Balanced weapon rule.</li></ul>"},{name:"Savage Fighters",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly WOLF SCOUT operative finishes retaliating, if it was not incapacitated, you can inflict D3+1 damage on the enemy operative in that sequence.</li></ul>"}],fight:[{name:"Acute Senses",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly WOLF SCOUT operative performs the Shoot action and you are selecting a valid target. Until the end of that action, that operative's ranged weapons have the Range 6\" and Seek Light weapon rules and enemy operatives cannot be obscured.</li></ul>"},{name:"Touched by Lokyar",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use after rolling your attack dice for a friendly WOLF SCOUT operative (excluding FENRISIAN WOLF), if it is fighting more than 5\" from other friendly operatives. You can re-roll any of your attack dice.</li></ul>"},{name:"Counterattack",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use at the end of an enemy operative's activation, or after an enemy operative performs the Fight action. One friendly WOLF SCOUT operative can immediately perform a free Fight action.</li><li class=\"desc-red\">You cannot select any other enemy operative to fight against during that action.</li></ul>"},{name:"Transhuman Physiology",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an operative is shooting a friendly WOLF SCOUT operative (excluding FENRISIAN WOLF), in the Roll Defence Dice step. You can retain one of your normal successes as a critical success instead.</li></ul>"}]},
  "canoptek":{name:"Canoptek Circle",subtitle:"Necrons",color:"var(--teal)",rules:[{name:"Obelisk Node Matrix",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT in the first turning point: place your three OBELISK NODE markers wholly within your territory. In each subsequent turning point you can move each of your OBELISK NODE markers up to 3\" horizontally as a STRATEGIC GAMBIT.</li><li class=\"desc-green\">Your OBELISK NODE markers control other markers within 1\" of them that no enemy operatives contest.</li><li class=\"desc-green\">Whenever one of your OBELISK NODE markers is within 6\" horizontally of another, those markers and the area between them create an OBELISK NODE MATRIX. If all three fulfil this, it creates a larger combined OBELISK NODE MATRIX.</li><li class=\"desc-green\">Whenever a friendly CANOPTEK CIRCLE operative is within your OBELISK NODE MATRIX: weapons on its datacard have the Accurate 1 weapon rule; add 1 to its APL stat (maximum 3).</li></ul>"}],strat:[{name:"Hypershielding",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly CANOPTEK CIRCLE operative, if your OBELISK NODE MATRIX is intervening, or that friendly operative is within your OBELISK NODE MATRIX, you can re-roll any of your defence dice results of one result (e.g. results of 2).</li></ul>"},{name:"Cryptogravitic Repulsion",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per action, the first time an enemy operative would move within your OBELISK NODE MATRIX, the distance is treated as an additional 1\".</li><li class=\"desc-red\">If that enemy operative doesn't have sufficient move distance, it cannot move within your OBELISK NODE MATRIX.</li></ul>"},{name:"Transdynamic Amplification",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly CANOPTEK CIRCLE operative is shooting, if your OBELISK NODE MATRIX is intervening, or the target is within your OBELISK NODE MATRIX, that friendly operative's weapons have the Ceaseless weapon rule.</li></ul>"},{name:"Souldrain",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an enemy operative is within your OBELISK NODE MATRIX, or whenever it is fighting or retaliating against a friendly CANOPTEK CIRCLE operative within your OBELISK NODE MATRIX, subtract 1 from both Dmg stats of that enemy operative's melee weapons (minimum 2) until the end of the activation/counteraction.</li><li class=\"desc-green\">Note this means if the enemy operative moves through your OBELISK NODE MATRIX, apply this change at the end of that move action until the end of the activation/counteraction.</li></ul>"}],fight:[{name:"Shield Flare",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an attack dice inflicts Normal Dmg on a friendly CANOPTEK CIRCLE operative. If your OBELISK NODE MATRIX is intervening, or that friendly operative is within your OBELISK NODE MATRIX, ignore that inflicted damage.</li><li class=\"desc-green\">Note your opponent determines intervening (i.e. where on their operative's base to draw the targeting lines from).</li></ul>"},{name:"Nodal Response",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use during a friendly CANOPTEK CIRCLE operative's activation, before or after it performs an action. You can either change one of the strategy ploys you used during this turning point (only pay additional CP if that ploy costs more), or use a strategy ploy now (pay its CP cost as normal).</li></ul>"},{name:"Animate Obelisk Nodes",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when it is your turn to activate or counteract with a friendly operative. Move any number of your OBELISK NODE markers instead \u2014 they can move up to 6\" horizontally combined (distances rounded up to nearest inch). You can also move them 0\" to skip an activation. Your opponent activates as normal afterwards.</li></ul>"},{name:"Sacrificial Thrall",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly CANOPTEK CIRCLE GEOMANCER operative is selected as valid target of a Shoot or Fight action. Select one other friendly CANOPTEK CIRCLE CANOPTEK operative visible to and within 3\" to become the valid target instead (even if it wouldn't normally be valid for this).</li><li class=\"desc-green\">If it's the Fight action, treat that other operative as being within the fighting operative's control range for the duration of that action.</li><li class=\"desc-red\">If it's a Shoot action, that other operative is only in cover or obscured if the original target was. No effect against Blast or Torrent weapons.</li></ul>"}]},
  "hernkyn":{name:"Hernkyn Yaegir",subtitle:"Leagues of Votann",color:"var(--teal)",rules:[{name:"Resourceful",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">In the Ready step of each Strategy phase after the first, you gain Resourceful points based on the number of friendly HERNKYN YAEGIR operatives in the killzone not within control range of enemy operatives: 5+ operatives = 2 points; 1-4 operatives = 1 point. Discard at end of each turning point.</li><li class=\"desc-green\">You can spend 1 Resourceful point during each activation of each friendly HERNKYN YAEGIR operative to: add 1 to its APL stat until the end of its activation (if not within control range of enemy operatives); OR have it regain up to D3+1 lost wounds when activated (if not within control range of enemy operatives).</li></ul>"},{name:"Dauntless Explorers",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">STRATEGIC GAMBIT in the first turning point. Each friendly HERNKYN YAEGIR operative wholly within your drop zone can immediately perform a free Reposition action.</li><li class=\"desc-red\">Each that does so must end that move wholly within 4\" of your drop zone.</li></ul>"}],strat:[{name:"Hidden Engagement",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly HERNKYN YAEGIR operative is shooting, if it is in cover from the target's perspective, that friendly operative's weapons have the Balanced weapon rule.</li><li class=\"desc-red\">Note: your opponent still determines the targeting lines (i.e. they decide which point of their operative's base targeting lines are drawn from).</li></ul>"},{name:"Masterful Bladework",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly HERNKYN YAEGIR operative is fighting, or has a Conceal order and is retaliating, add 1 to the Atk stat of its melee weapons (maximum 4) and they have the Balanced weapon rule.</li><li class=\"desc-green\">If the weapon already has Balanced, it has the Ceaseless weapon rule instead.</li></ul>"},{name:"Tough Survivalists",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">The first time an attack dice inflicts damage on each friendly HERNKYN YAEGIR operative during the turning point in the Resolve Attack Dice step, you can halve that inflicted damage (rounding up, minimum 2).</li></ul>"},{name:"In Position",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly HERNKYN YAEGIR operative has a Conceal order and is in cover, it cannot be selected as a valid target (takes precedence over all other rules except being within 2\").</li></ul>"}],fight:[{name:"Sturdy",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an operative is shooting a friendly HERNKYN YAEGIR operative, when you collect your defence dice. Change the attacker's retained critical successes to normal successes.</li><li class=\"desc-red\">Any weapon rules already resolved (e.g. Piercing Crits) are not affected.</li></ul>"},{name:"Bonds That Bind",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly HERNKYN YAEGIR operative is activated. Select one other ready friendly HERNKYN YAEGIR operative visible to and within 3\". When the first operative is expended, you can activate that other operative before your opponent activates.</li><li class=\"desc-red\">Neither operative can be a BOMBAST operative if its Wroughtlock Negotiation STRATEGIC GAMBIT has been used this turning point.</li></ul>"},{name:"No Kin Left Behind",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly HERNKYN YAEGIR operative is incapacitated. Before it is removed, remove your Fallen Kin marker (if any) and place it within that operative's control range.</li><li class=\"desc-green\">Whenever a friendly HERNKYN YAEGIR operative within 3\" of your Fallen Kin marker is shooting, fighting or retaliating, in the Roll Attack Dice step, you can retain one of your fails as a normal success, or retain one normal success as a critical success instead.</li></ul>"},{name:"Stalwart Defence",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when an enemy operative ends a move within control range of a friendly HERNKYN YAEGIR operative. Select one other friendly HERNKYN YAEGIR operative visible to and within 6\" that is not itself within control range of enemy operatives. That operative can perform a free Shoot action targeting that enemy operative. It can target that enemy operative even though it's within control range of a friendly operative.</li><li class=\"desc-red\">Cannot target any other enemy operative. Cannot select a frag/krak grenade or a weapon with Blast or Devastating with a distance.</li></ul>"}]},
  "vespid":{name:"Vespid Stingwings",subtitle:"T'au Empire",color:"var(--teal)",rules:[{name:"Communion",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">In the Ready step of each Strategy phase, you gain D3 Communion points, plus 1 if a friendly OVERSIGHT DRONE is in the killzone.</li><li class=\"desc-green\">(1) Shoot action: can only target the closest enemy operative within 8\" (excluding those in control range of friendly VESPID STINGWING operatives) unless you spend 1 Communion point.</li><li class=\"desc-green\">(2) Charge action: must end within control range of the closest enemy operative it can, unless you spend 1 Communion point.</li><li class=\"desc-green\">(3) Pick Up Marker or mission action (excluding Operate Hatch): must also spend 1 Communion point.</li><li class=\"desc-green\">(4) When shooting: you can spend 1 (and only 1) Communion point to re-roll one of your attack dice.</li><li class=\"desc-red\">OVERSIGHT DRONE operatives are not affected by rules 1-4.</li></ul>"},{name:"Neutron Charge",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Neutron weapons are any weapons with \"neutron\" in their name (e.g. neutron blaster, neutron grenade launcher).</li><li class=\"desc-green\">Whenever a friendly VESPID STINGWING operative moves or uses FLY, its neutron weapons have the Piercing 1 weapon rule until the end of the turning point.</li></ul>"},{name:"Fly",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly VESPID STINGWING operative performs an action in which it moves, it can FLY. If it does, remove it from the killzone and set it back up wholly within a distance equal to its Move stat (or 3\" if a Dash) horizontally.</li><li class=\"desc-red\">In close quarters killzones, this distance cannot be measured over or through Wall terrain, and the operative cannot be set up on the other side of an access point.</li><li class=\"desc-red\">No additional distance when performing the Charge action. Cannot be set up within control range of an enemy operative unless it is the Charge action.</li></ul>"}],strat:[{name:"Hardened Exoskeleton",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly VESPID STINGWING operative (excluding OVERSIGHT DRONE) is fighting or retaliating, Normal Dmg of 4 or more inflicts 1 less damage on it.</li></ul>"},{name:"Aerial Agility",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly VESPID STINGWING operative while counteracting, or during an activation in which that shooting operative moved or was set up, roll one D6 whenever an attack dice would inflict Normal Dmg: on a 5+, ignore that inflicted damage.</li><li class=\"desc-red\">Cannot ignore more than one attack dice per Shoot action sequence this way.</li></ul>"},{name:"Airborne Predators",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly VESPID STINGWING operative moves or uses FLY during its activation, its weapons have the Balanced weapon rule until the end of that activation.</li></ul>"},{name:"Sting",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Improve the Hit stat of friendly VESPID STINGWING operatives' claws by 1, and those weapons have the Lethal 5+ and Shock weapon rules.</li></ul>"}],fight:[{name:"Ocelli",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly VESPID STINGWING operative performs the Shoot action during an activation in which it has used FLY. Until the end of that action, it gains all benefits from the first and second main features of Vantage terrain. Treat that operative as being 3\" higher than it currently is when determining height differences for Vantage terrain rules.</li><li class=\"desc-green\">Note: whenever an operative on Vantage terrain is shooting an operative that has an Engage order, its ranged weapon has the Accurate 1 weapon rule if the target operative is at least 2\" lower than it, or Accurate 2 if the target operative is at least 4\" lower than it.</li><li class=\"desc-green\">Note: whenever you are selecting a valid target for an operative on Vantage terrain, operatives at least 2\" lower than that operative with a Conceal order cannot use Light terrain for cover. Whilst this can allow such operatives to be targeted (assuming they're visible), it doesn't remove their cover save, and the defender can retain it as a critical success instead, or retain one additional cover save.</li><li class=\"desc-red\">Not when determining the distance for Communion.</li></ul>"},{name:"Darting Flight",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly VESPID STINGWING operative performs the Reposition action. Until the end of that action, it can move an additional D3\", or be set up an additional D3\" away if it uses FLY.</li><li class=\"desc-red\">It cannot perform Shoot or Fight actions for the rest of the turning point.</li></ul>"},{name:"Neutron Overload",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when you resolve a critical success for a friendly VESPID STINGWING operative shooting with a neutron weapon during an activation in which it has moved or used FLY. If the target is within 4\", inflict D3 additional damage.</li></ul>"},{name:"Vicious Venom",desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Use when a friendly VESPID STINGWING operative (excluding OVERSIGHT DRONE) is fighting and you strike with a critical success. Inflict D3 additional damage.</li></ul>"}]}
};
const FACTION_EQ = {
  "murderwing": [
    {id:"mw-bladefins", name:"Bladefins", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly MURDERWING operatives can perform the following unique action:</li></ul><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">SLICE FROM ABOVE</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">BOOST action. Inflict D3+1 damage on one enemy operative within this operative's BOOST ZONE. <span style=\"color:var(--red,#e05c5c);font-style:italic\">Cannot perform normally — only during Fall Back or Reposition after setting up from a BOOST.</span></p></div>"},
    {id:"mw-clawed", name:"Clawed Armour", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly MURDERWING operatives can perform the following unique action:</li></ul><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">CLAWED CHARGE</span><span class=\"inline-action-ap\">0AP</span></div><p class=\"inline-action-desc\">BOOST action. Inflict 1 damage on one enemy operative within this operative's control range, then the Charge action ends. <span style=\"color:var(--red,#e05c5c);font-style:italic\">Cannot perform normally — only during the Charge action after setting up from a BOOST.</span></p></div>"},
    {id:"mw-warpfuel", name:"Warp Fuel", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when an enemy operative ends the Fall Back action during its activation, if at least one friendly MURDERWING operative was within its control range at the start of that action: one of those friendly operatives can immediately perform a free Reposition or Charge action, but cannot use more than 3\" of move distance.</li><li class=\"desc-red\">Note: if the enemy operative does not perform Fall Back during its own activation, this has no effect.</li></ul>"},
    {id:"mw-voxcasters", name:"Vox-Casters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Friendly MURDERWING operatives can perform the following unique action:</li></ul><div class=\"inline-action\"><div class=\"inline-action-header\"><span class=\"inline-action-icon\">&#9889;</span><span class=\"inline-action-name\">VOX-CRY</span><span class=\"inline-action-ap\">1AP</span></div><p class=\"inline-action-desc\">Each enemy operative within 3\" of this operative takes a stun test: roll one D6 — on a 3+, subtract 1 from its APL stat until the end of its next activation. <span style=\"color:var(--red,#e05c5c);font-style:italic\">Cannot perform this action while this operative has a Conceal order.</span></p></div>"}
  ],
  "raveners": [
    {id:"rv-chromato", name:"Chromatospore Camouflage", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever an operative is shooting a friendly RAVENER operative, if you can retain any cover saves, you can retain one additional cover save.</li><li class=\"desc-red\">Not cumulative with improved cover saves from Vantage terrain.</li></ul>"},
    {id:"rv-acidblood", name:"Acid Blood", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly RAVENER operative is fighting or retaliating, whenever an attack dice inflicts damage on it, roll one D6: on a 5+, inflict 1 damage on the enemy operative in that sequence.</li></ul>"},
    {id:"rv-metamorphic", name:"Metamorphic Flesh", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly RAVENER operative is activated, it regains up to D3 lost wounds.</li></ul>"},
    {id:"rv-heightened", name:"Heightened Senses", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per battle, after rolling off to decide initiative, if a friendly RAVENER operative is underground and an enemy operative is within 5\" of your TUNNEL, you can re-roll your dice.</li></ul>"}
  ],
  "xv26": [
    {id:"xv-multitrackers", name:"XV26 Multitrackers", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Once per turning point, when a friendly XV26 STEALTH BATTLESUIT operative is performing the Shoot action and selects a burst cannon (sweeping), until the end of that action that weapon has the Torrent 2\" weapon rule.</li></ul>"},
    {id:"xv-blacksun", name:"Advanced Blacksun Filters", desc:"<ul class=\"desc-list\"><li class=\"desc-green\">Whenever a friendly XV26 STEALTH BATTLESUIT operative is shooting an operative that is obscured, you do not have to discard one success as a result of that rule.</li><li class=\"desc-red\">All other effects of obscured apply as normal.</li></ul>"},
